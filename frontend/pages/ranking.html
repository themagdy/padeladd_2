<div class="page active" id="ranking-page" style="background:var(--c-bg); overflow:visible !important;">

  <div style="width:100%; max-width:900px; margin:0 auto; padding:40px 20px 80px; overflow:visible !important;">
    
    <!-- Page Header -->
    <div style="margin-bottom:40px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
        <img src="assets/logo_ico.png" style="height:24px; width:auto;">
        <span style="font-size:12px; font-weight:800; color:var(--c-primary); text-transform:uppercase; letter-spacing:2px;">Official Leaderboard</span>
      </div>
      <h1 style="font-size:36px; font-weight:800; color:#fff; margin:0;">Players Ranking</h1>
      <p style="color:var(--c-text-muted); font-size:16px; margin-top:8px;">Compete with the best players in the community.</p>
    </div>

    <!-- Controls Row (Sticky) -->
    <div style="position:-webkit-sticky; position:sticky; top:0; z-index:100; background:var(--c-bg); display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:20px; margin-bottom:32px; padding:10px 0 20px;">
      <!-- Gender Tabs -->
      <div style="background:var(--c-bg-card); padding:6px; border-radius:12px; display:flex; gap:4px; border:1px solid var(--c-border);">
        <button id="rank-tab-male" onclick="RankingController.switchTab('male')" class="rank-tab-btn active">Males</button>
        <button id="rank-tab-female" onclick="RankingController.switchTab('female')" class="rank-tab-btn">Females</button>
      </div>

      <!-- Search (Optional placeholder for now) -->
      <div style="position:relative; width:100%; max-width:300px;">
        <input type="text" id="rank-search" placeholder="Search player..." oninput="RankingController.handleSearch(this.value)" style="width:100%; background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:12px; padding:12px 40px 12px 40px; color:#fff; font-size:14px;">
        <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); opacity:0.5;">🔍</span>
        <span id="rank-search-clear" onclick="RankingController.clearSearch()" style="display:none; position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; opacity:0.5; font-size:18px;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">✕</span>
      </div>
    </div>

    <!-- Ranking Table Card -->
    <div style="background:var(--g-card); border:1px solid var(--c-border); border-radius:var(--r-lg); overflow:visible !important;">
      
      <!-- Table Header (Sticky) -->
      <div class="rank-table-row header" style="position:-webkit-sticky; position:sticky; top:74px; z-index:90; display:grid; grid-template-columns:60px 1fr 60px 100px 80px 80px; padding:20px; background:rgba(25, 30, 41, 0.98); border-bottom:1px solid var(--c-border); color:var(--c-text-muted); font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);">
        <span>Rank</span>
        <span>Player</span>
        <span style="text-align:center;">Age</span>
        <span style="text-align:center;">Matches</span>
        <span style="text-align:right;">Win Rate</span>
        <span style="text-align:right;">Points</span>
      </div>

      <!-- Table Body -->
      <div id="ranking-full-list" style="min-height:400px;">
        <!-- Skeletons -->
        <div class="rank-row-skeleton"></div>
        <div class="rank-row-skeleton"></div>
        <div class="rank-row-skeleton"></div>
        <div class="rank-row-skeleton"></div>
        <div class="rank-row-skeleton"></div>
      </div>

    </div>

    <!-- Info Footer -->
    <div style="margin-top:32px; text-align:center; padding:24px; background:rgba(255,255,255,0.02); border-radius:16px; border:1px dashed var(--c-border);">
        <p style="font-size:14px; color:var(--c-text-muted); margin:0;">
            Ranking is updated after every match approval. <br> 
            Check the <a href="#" style="color:var(--c-primary); font-weight:700;">Ranking Rules</a> to learn more.
        </p>
    </div>

  </div>
</div>

<style>
.rank-tab-btn {
    background:transparent;
    border:none;
    color:var(--c-text-muted);
    padding:8px 24px;
    font-size:14px;
    font-weight:700;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
}
.rank-tab-btn.active {
    background:var(--c-primary);
    color:#fff;
    box-shadow:0 4px 12px rgba(27, 82, 206, 0.3);
}

.rank-row-skeleton {
    height:74px;
    margin:10px 20px;
    background:rgba(255,255,255,0.03);
    border-radius:12px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

@media (max-width: 600px) {
    .rank-table-row {
        grid-template-columns: 50px 1fr 80px !important;
    }
    .rank-table-row span:nth-child(3),
    .rank-table-row span:nth-child(4),
    .rank-table-row span:nth-child(5) {
        display:none !important;
    }
}
</style>
