<div class="page active container" style="max-width: 500px; margin: 10px auto 0; padding: 0 20px; text-align: left;">
    <div class="auth-logo" style="display:flex; justify-content:left; margin: 24px 0 24px 0;">
      <img src="assets/logo_ico.png" alt="Padeladd" style="width:38px; height:auto; object-fit:contain;">
    </div>
    <h1 id="edit-profile-title" class="auth-title">Complete Your Profile</h1>
    <p id="edit-profile-subtitle" style="opacity: 0.8; margin-bottom: 20px; text-align:left;">Tell us more about yourself to join the leaderboard.</p>
    
    <!-- Profile Image Section -->
    <div style="display:flex; align-items:flex-start; gap:20px; margin-bottom:32px; background:var(--c-bg-card); padding:20px; border-radius: var(--r-sm); border:1px solid var(--c-border);">
        <div id="edit-avatar-container" style="position:relative; width:80px; height:80px;">
            <div id="edit-avatar-preview" class="avatar-placeholder" style="width:80px; height:80px; font-size:28px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <img id="edit-avatar-img" src="" style="display:none; width:80px; height:80px; border-radius:50%; object-fit:cover;">
        </div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button type="button" onclick="document.getElementById('avatar-input').click()" class="btn btn-primary btn-sm" style="width:auto;">Upload Photo</button>
            <button id="remove-avatar-btn" type="button" style="display:none; background:transparent; border:none; color:var(--c-red); font-size:12px; font-weight:700; width:fit-content; border-bottom:1px solid transparent; padding:2px 0; margin-top:5px;" onmouseover="this.style.borderBottomColor='var(--c-red)'" onmouseout="this.style.borderBottomColor='transparent'">Remove photo</button>
            <input type="file" id="avatar-input" accept="image/*" style="display:none;">
            <p style="font-size:11px; color:var(--c-text-dim);">JPG, PNG or WEBP.</p>
        </div>
    </div>
    <form id="profile-form" novalidate>
        <div style="display: flex; gap: 12px; margin-bottom: 0;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">First Name *</label>
                <input type="text" name="first_name" class="form-input" placeholder="e.g. Ahmed" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Last Name *</label>
                <input type="text" name="last_name" class="form-input" placeholder="e.g. Magdy" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Nickname (Optional)</label>
            <input type="text" name="nickname" class="form-input" placeholder="e.g. Smash King">
        </div>
        
        <div class="form-group">
            <label class="form-label">Date of Birth *</label>
            <div style="display: flex; gap: 8px;">
                <select name="dob_day" class="form-select" style="flex: 0.8;" required>
                    <option value="">Day</option>
                </select>
                <select name="dob_month" class="form-select" style="flex: 1.5;" required>
                    <option value="">Month</option>
                    <option value="01">Jan</option>
                    <option value="02">Feb</option>
                    <option value="03">Mar</option>
                    <option value="04">Apr</option>
                    <option value="05">May</option>
                    <option value="06">Jun</option>
                    <option value="07">Jul</option>
                    <option value="08">Aug</option>
                    <option value="09">Sep</option>
                    <option value="10">Oct</option>
                    <option value="11">Nov</option>
                    <option value="12">Dec</option>
                </select>
                <select name="dob_year" class="form-select" style="flex: 1.2;" required>
                    <option value="">Year</option>
                </select>
            </div>
        </div>
        
        <div style="display: flex; gap: 12px; margin-bottom: 16px;">
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label class="form-label">Gender *</label>
                <select name="gender" class="form-select" required>
                    <option value="">Select...</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label class="form-label">Your side *</label>
                <select name="playing_side" class="form-select" required>
                    <option value="">Select...</option>
                    <option value="right">Right</option>
                    <option value="left">Left</option>
                    <option value="flexible">Flexible</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Location *</label>
            <select name="location" class="form-select" required>
                <option value="">Select city...</option>
                <option value="Cairo">Cairo</option>
                <option value="Giza">Giza</option>
                <option value="Alexandria">Alexandria</option>
                <option value="Sahel">Sahel</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Short Bio</label>
            <textarea name="bio" class="form-textarea" rows="3" placeholder="A bit about your playstyle..."></textarea>
        </div>
        
        <button id="edit-profile-submit" type="submit" class="btn btn-primary" style="margin-top: 20px;">Save Profile & Start Playing</button>
    </form>
</div>

<!-- Level Selection Modal (Hidden by default) -->
<div id="level-selection-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; backdrop-filter:blur(12px); align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--c-bg); width:100%; max-width:480px; border-radius:24px; border:1px solid rgba(255,255,255,0.08); display:flex; flex-direction:column; max-height:85vh; box-shadow:0 24px 48px rgba(0,0,0,0.4);">
        
        <div style="padding:20px 32px 16px; display:flex; align-items:center; gap:14px; position:sticky; top:0; background:var(--c-bg); border-radius:24px 24px 0 0; z-index:10; border-bottom:1px solid rgba(255,255,255,0.04);">
            <div style="width:38px; height:38px; background:linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(14, 165, 233, 0.05)); border:1px solid rgba(14, 165, 233, 0.2); color:var(--c-primary); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.1); flex-shrink:0;">🎾</div>
            <h2 style="font-size:20px; font-weight:800; color:#fff; margin:0; letter-spacing:-0.3px;">Choose Your Level</h2>
        </div>

        <div class="custom-scroll" style="padding:16px 32px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:12px;">
            <!-- Level Options -->
            <label class="level-option">
                <input type="radio" name="player_level" value="Beginner" onchange="document.getElementById('level-selection-submit').disabled = false; document.getElementById('level-selection-submit').classList.add('active');">
                <div class="level-content">
                    <div class="level-header">
                        <span class="level-title-en">Beginner</span>
                        <span class="level-title-ar" dir="rtl">مبتدئ</span>
                    </div>
                    <div class="level-desc">New to racket sports.</div>
                </div>
            </label>
            <label class="level-option">
                <input type="radio" name="player_level" value="Initiation Intermediate" onchange="document.getElementById('level-selection-submit').disabled = false; document.getElementById('level-selection-submit').classList.add('active');">
                <div class="level-content">
                    <div class="level-header">
                        <span class="level-title-en">Initiation Intermediate</span>
                        <span class="level-title-ar" dir="rtl">مبتدئ متوسط</span>
                    </div>
                    <div class="level-desc">Gaining experience and learning technique.</div>
                </div>
            </label>
            <label class="level-option">
                <input type="radio" name="player_level" value="Intermediate" onchange="document.getElementById('level-selection-submit').disabled = false; document.getElementById('level-selection-submit').classList.add('active');">
                <div class="level-content">
                    <div class="level-header">
                        <span class="level-title-en">Intermediate</span>
                        <span class="level-title-ar" dir="rtl">متوسط</span>
                    </div>
                    <div class="level-desc">Developing tactics and consistency.</div>
                </div>
            </label>
            <label class="level-option">
                <input type="radio" name="player_level" value="Intermediate High" onchange="document.getElementById('level-selection-submit').disabled = false; document.getElementById('level-selection-submit').classList.add('active');">
                <div class="level-content">
                    <div class="level-header">
                        <span class="level-title-en">Intermediate High</span>
                        <span class="level-title-ar" dir="rtl">متوسط مرتفع</span>
                    </div>
                    <div class="level-desc">Confident with established strategies.</div>
                </div>
            </label>
            <label class="level-option">
                <input type="radio" name="player_level" value="Advanced" onchange="document.getElementById('level-selection-submit').disabled = false; document.getElementById('level-selection-submit').classList.add('active');">
                <div class="level-content">
                    <div class="level-header">
                        <span class="level-title-en">Advanced</span>
                        <span class="level-title-ar" dir="rtl">متقدم</span>
                    </div>
                    <div class="level-desc">Skilled in transitioning between attack and defense.</div>
                </div>
            </label>
            <label class="level-option">
                <input type="radio" name="player_level" value="Competition" onchange="document.getElementById('level-selection-submit').disabled = false; document.getElementById('level-selection-submit').classList.add('active');">
                <div class="level-content">
                    <div class="level-header">
                        <span class="level-title-en">Competition</span>
                        <span class="level-title-ar" dir="rtl">تنافسي</span>
                    </div>
                    <div class="level-desc">High-level tournament players.</div>
                </div>
            </label>
            <label class="level-option">
                <input type="radio" name="player_level" value="Professional" onchange="document.getElementById('level-selection-submit').disabled = false; document.getElementById('level-selection-submit').classList.add('active');">
                <div class="level-content">
                    <div class="level-header">
                        <span class="level-title-en">Professional</span>
                        <span class="level-title-ar" dir="rtl">محترف</span>
                    </div>
                    <div class="level-desc">Top-tier professional players.</div>
                </div>
            </label>
        </div>

        <div style="padding:24px 32px 32px; position:sticky; bottom:0; background:linear-gradient(to top, var(--c-bg) 80%, transparent); border-radius:0 0 24px 24px; z-index:10;">
            <button id="level-selection-submit" type="button" onclick="ProfileController.submitLevel()" class="btn btn-primary" style="width:100%; font-size:16px; padding:16px; border-radius:14px; opacity:0.5; transition:all 0.3s;" disabled>Save & Continue</button>
        </div>
    </div>
</div>

<style>
.level-option {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(255,255,255,0.02);
    position: relative;
}
.level-option:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.1);
}
.level-option input[type="radio"] {
    display: none;
}
.level-content {
    flex: 1;
}
.level-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}
.level-title-en {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    transition: color 0.2s;
}
.level-title-ar {
    font-size: 15px;
    font-weight: 700;
    color: var(--c-text-muted);
    transition: color 0.2s;
}
.level-desc {
    font-size: 13px;
    color: var(--c-text-muted);
    line-height: 1.4;
}

/* Checked State */
.level-option:has(input:checked) {
    border-color: var(--c-primary) !important;
    background: rgba(14, 165, 233, 0.08) !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(14, 165, 233, 0.15);
}
.level-option:has(input:checked) .level-title-en,
.level-option:has(input:checked) .level-title-ar {
    color: var(--c-primary);
}

/* Button Active State */
#level-selection-submit.active {
    opacity: 1 !important;
    box-shadow: 0 8px 24px rgba(14, 165, 233, 0.3);
}

/* Custom Scrollbar for Modal */
.custom-scroll::-webkit-scrollbar {
    width: 6px;
}
.custom-scroll::-webkit-scrollbar-track {
    background: transparent;
}
.custom-scroll::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}
</style>
