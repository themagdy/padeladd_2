<div class="page active" style="background:var(--c-bg); min-height:100vh; padding-bottom:100px;">

  <div style="width:100%; max-width:1200px; margin:0 auto; padding:0 20px;">
    
    <!-- HEADER -->
    <div style="padding:40px 0 48px; border-bottom:1px solid var(--c-border);">
      
      <div style="display:flex; flex-wrap:wrap; align-items:start; justify-content:space-between; gap:32px; margin-bottom:40px;">
        
        <div style="display:flex; align-items:center; gap:24px; min-width:300px;">
          <!-- Avatar -->
          <div id="prof-avatar" style="width:110px; height:110px; border-radius:50%; background:var(--g-primary); display:flex; align-items:center; justify-content:center; font-size:44px; font-weight:800; color:#fff; flex-shrink:0; border:4px solid var(--c-border); box-shadow:0 12px 40px rgba(0,0,0,0.4);">?</div>
          
          <div style="min-width:0;">
            <h1 id="prof-name" style="font-size:36px; font-weight:800; letter-spacing:-0.5px; margin-bottom:10px; color:#fff;">Loading...</h1>
            <div style="display:flex; flex-direction:column; gap:12px;">
              <div id="prof-code" class="profile-code" style="display:inline-flex; align-items:center; width:fit-content; gap:4px; background:var(--c-bg-secondary); border:1px solid var(--c-border); border-radius:var(--r-full); padding:5px 16px; font-size:12px; font-weight:800; letter-spacing:1px; color:var(--c-orange);"></div>
              <div id="prof-meta" style="display:flex; flex-wrap:wrap; gap:16px;"></div>
            </div>
          </div>
        </div>
        
        <button id="prof-edit-btn" onclick="Router.navigate('/profile/edit')" class="btn" style="display:none; background:#293342; color:#fff; padding:12px 24px; font-weight:700; border-radius:12px; border:1px solid var(--c-border); flex-shrink:0;">Edit Profile</button>
      </div>

      <!-- Bio -->
      <p id="prof-bio" style="font-size:16px; color:var(--c-text-muted); line-height:1.7; display:none; max-width:750px; margin-bottom:50px; padding:20px; background:rgba(255,255,255,0.03); border-left:3px solid var(--c-primary); border-radius:4px;"></p>

      <!-- Stats Grid (Dashboard style) -->
      <div class="prof-stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; align-items:stretch;">
        <div style="background:transparent; border:1px solid var(--c-border); border-radius:18px; padding:24px 22px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-rank" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">—</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text-dim); text-transform:uppercase; letter-spacing:0.5px;">Current Rank</div>
        </div>
        
        <div style="background:transparent; border:1px solid var(--c-border); border-radius:18px; padding:24px 22px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-points" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">0</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text-dim); text-transform:uppercase; letter-spacing:0.5px;">Points</div>
        </div>

        <div style="background:transparent; border:1px solid var(--c-border); border-radius:18px; padding:24px 22px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-matches" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">0</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text-dim); text-transform:uppercase; letter-spacing:0.5px;">Matches</div>
        </div>

        <div style="background:transparent; border:1px solid var(--c-border); border-radius:18px; padding:24px 22px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-winrate" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">0%</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text-dim); text-transform:uppercase; letter-spacing:0.5px;">Win Rate</div>
        </div>
        
        <!-- Call to action card -->
        <div onclick="Router.navigate('/matches')" style="cursor:pointer; display:flex; align-items:center; justify-content:center; background:var(--g-primary); border-radius:18px; padding:24px; text-align:center; transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
           <span style="font-size:15px; font-weight:800; letter-spacing:1px; color:#fff;">READY TO PLAY 🎾</span>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="prof-content-grid" style="display:grid; grid-template-columns:1fr 340px; gap:60px; padding:60px 0;">
      
      <!-- LEFT: MATCH HISTORY -->
      <div>
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:32px;">
          <img src="assets/logo_ico.png" style="height:22px; width:auto;">
          <span style="font-size:13px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted);">Match History</span>
        </div>
        <div id="pv-matches-list">
          <div class="skeleton" style="height:90px; border-radius:var(--r-lg); margin-bottom:12px;"></div>
          <div class="skeleton" style="height:90px; border-radius:var(--r-lg); margin-bottom:12px;"></div>
        </div>
      </div>

      <!-- RIGHT: ACHIEVEMENTS -->
      <div style="border-left:1px solid var(--c-border); padding-left:40px;">
        <div style="font-size:13px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted); margin-bottom:32px;">Achievements</div>
        <div style="background:var(--c-bg-secondary); border:1px dashed var(--c-border); border-radius:20px; padding:60px 30px; text-align:center; color:var(--c-text-dim);">
          <div style="font-size:48px; margin-bottom:20px;">🏆</div>
          <div style="font-size:14px; font-weight:700; color:var(--c-text-muted); margin-bottom:8px;">Achievements Coming Soon</div>
          <div style="font-size:12px;">Complete matches to earn trophies and special badges!</div>
        </div>
      </div>

    </div>
  </div>

</div>

<style>
@media (max-width: 992px) {
  .prof-content-grid {
    grid-template-columns: 1fr !important;
    gap: 40px !important;
  }
  .prof-content-grid > div:last-child {
    border-left: none !important;
    padding-left: 0 !important;
  }
}
@media (max-width: 600px) {
  .prof-stats-grid {
    grid-template-columns: 1fr 1fr !important;
  }
}
</style>
