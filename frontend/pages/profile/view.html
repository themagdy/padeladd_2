<div class="page active" style="background:var(--c-bg);">

          <div style="font-size:24px;">🎾</div>

            <div id="pv-winrate" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:8px;">0%</div>
            <div style="font-size:13px; font-weight:600; color:#fff;">Win Rate</div>
          </div>
          <div style="font-size:24px;">🎯</div>
        </div>
        
        <!-- Action Cards (Only shown to owner) -->
        <div id="prof-action-cards" style="display:none; gap:12px; flex-direction:column;">
            <div onclick="Router.navigate('/profile/edit')" style="flex:1; cursor:pointer; display:flex; align-items:center; justify-content:center; background:var(--c-primary); border:1px solid transparent; border-radius: var(--r-md); padding:16px; text-align:center; transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">

            </div>
            <div onclick="API.post('/logout').then(() => { Auth.clearAll(); Router.navigate('/login'); })" style="flex:1; cursor:pointer; display:flex; align-items:center; justify-content:center; background:rgba(255,59,48,0.1); border:1px solid rgba(255,59,48,0.3); border-radius: var(--r-md); padding:16px; text-align:center; transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">

        </div>
        <div id="pv-matches-list">

</div>
