.v-avatar {
  width: 140px;
  height: 140px;
  font-size: 56px;

/* Avatar Rich Animation */
.v-avatar {
    position: relative;
    overflow: hidden;
    animation: avatarAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes avatarAppear {
    0% { transform: scale(0.9) translateY(10px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}

.avatar-scan-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, 
    transparent 40%, 
    rgba(255, 139, 0, 0.8) 50%, 
    rgba(255, 255, 255, 1) 50.5%, 
    rgba(255, 139, 0, 0.8) 51%, 
    transparent 60%
  );
  transform: translateY(-100%);
  animation: scanReveal 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
  pointer-events: none;
  z-index: 5;
}

/* Secondary Data Grid Effect */
.avatar-scan-overlay::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255, 149, 0, 0.03) 2px,
    rgba(255, 149, 0, 0.03) 4px
  );
  opacity: 0.5;
}

@keyframes scanReveal {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

/* Mid-scan Glow Flash */
.v-avatar::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
  opacity: 0;
  z-index: 4;
  pointer-events: none;
  animation: glowFlash 1.2s ease-out 0.8s forwards;
}

@keyframes glowFlash {
  0% { opacity: 0; transform: scale(0.5); }
  30% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.5); }
}
</style>
