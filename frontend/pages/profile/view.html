<div class="page active" style="background:var(--c-bg); min-height:100vh;">

  <div style="width:100%; max-width:1200px; margin:0 auto; padding:0 20px;">
    
    <!-- HEADER -->
    <div style="padding:40px 0 32px; border-bottom:1px solid var(--c-border);">
      <div style="display:flex; align-items:center; gap:24px; margin-bottom:32px;">
        <!-- Avatar -->
        <div id="prof-avatar" style="width:100px; height:100px; border-radius:50%; background:var(--g-primary); display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:800; color:#fff; flex-shrink:0; border:4px solid var(--c-border); box-shadow:0 10px 30px rgba(0,0,0,0.3);">?</div>
        
        <div style="flex:1; min-width:0;">
          <h1 id="prof-name" style="font-size:32px; font-weight:800; letter-spacing:-0.5px; margin-bottom:8px;">Loading...</h1>
          <div style="display:flex; flex-wrap:wrap; align-items:center; gap:16px;">
            <div id="prof-code" class="profile-code" style="display:inline-flex; align-items:center; gap:4px; background:var(--c-bg-secondary); border:1px solid var(--c-border); border-radius:var(--r-full); padding:4px 14px; font-size:12px; font-weight:800; letter-spacing:1px; color:var(--c-orange);"></div>
            <div id="prof-meta" style="display:flex; flex-wrap:wrap; gap:12px;"></div>
          </div>
        </div>
        
        <button onclick="Router.navigate('/profile/edit')" class="btn" style="background:#293342; color:#fff; align-self:flex-start;">Edit Profile</button>
      </div>

      <!-- Bio -->
      <p id="prof-bio" style="font-size:15px; color:var(--c-text-muted); line-height:1.6; display:none; max-width:700px; margin-bottom:40px;"></p>

      <!-- Stats Grid (Dashboard style) -->
      <div style="display:grid; grid-template-columns:repeat(4, 1fr) 280px; gap:12px; align-items:stretch;">
        <div style="background:transparent; border:1px solid var(--c-border); border-radius:16px; padding:20px 18px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-rank" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:8px;">—</div>
          <div style="font-size:13px; font-weight:600; color:#fff;">Current Rank</div>
        </div>
        
        <div style="background:transparent; border:1px solid var(--c-border); border-radius:16px; padding:20px 18px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-points" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:8px;">0</div>
          <div style="font-size:13px; font-weight:600; color:#fff;">Points</div>
        </div>

        <div style="background:transparent; border:1px solid var(--c-border); border-radius:16px; padding:20px 18px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-matches" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:8px;">0</div>
          <div style="font-size:13px; font-weight:600; color:#fff;">Matches</div>
        </div>

        <div style="background:transparent; border:1px solid var(--c-border); border-radius:16px; padding:20px 18px; display:flex; flex-direction:column; justify-content:center;">
          <div id="pv-winrate" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:8px;">0%</div>
          <div style="font-size:13px; font-weight:600; color:#fff;">Win Rate</div>
        </div>
        
        <div style="display:flex; align-items:center; justify-content:center; background:var(--g-primary); border-radius:16px; padding:20px; text-align:center;">
           <span style="font-size:14px; font-weight:800; letter-spacing:1px; color:#fff;">READY TO PLAY</span>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div style="display:grid; grid-template-columns:1fr 340px; gap:60px; padding:40px 0;">
      
      <!-- LEFT: MATCH HISTORY -->
      <div>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
          <img src="assets/logo_ico.png" style="height:20px; width:auto;">
          <span style="font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted);">Match History</span>
        </div>
        <div id="pv-matches-list">
          <div class="skeleton" style="height:90px; border-radius:var(--r-lg); margin-bottom:12px;"></div>
          <div class="skeleton" style="height:90px; border-radius:var(--r-lg); margin-bottom:12px;"></div>
        </div>
      </div>

      <!-- RIGHT: PLACEHOLDER FOR TROPHIES / ACHIEVEMENTS -->
      <div style="border-left:1px solid var(--c-border); padding-left:40px;">
        <div style="font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted); margin-bottom:24px;">Achievements</div>
        <div style="background:var(--c-bg-secondary); border:1px dashed var(--c-border); border-radius:16px; padding:40px 20px; text-align:center; color:var(--c-text-dim);">
          <div style="font-size:32px; margin-bottom:12px;">🏆</div>
          <div style="font-size:13px; font-weight:600;">Achievements Coming Soon</div>
        </div>
      </div>

    </div>
  </div>

</div>
