<div class="page active" id="dashboard-page" style="background:var(--c-bg); min-height:100vh;">

  <div style="width:100%; max-width:1200px; margin:0 auto; padding:0 20px;">

    <!-- ═══════════════════════════════════════════
         WELCOME + STATS SECTION
    ═══════════════════════════════════════════ -->
    <div style="padding:40px 0 32px; border-bottom:1px solid var(--c-border);">
      <h1 style="font-size:32px; font-weight:400; margin-bottom:6px;">Welcome back, <strong id="dash-name" style="font-weight:800;">Player</strong></h1>
      <p style="color:var(--c-text-muted); font-size:15px; margin-bottom:32px;">Here's your padel overview</p>

      <!-- Stats + Actions grid -->
      <div class="dash-stats-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr 340px; gap:16px; align-items:stretch;">

        <!-- Ranking -->
        <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:24px 22px;">
          <div id="dash-ranking" style="font-size:40px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:12px;">—</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Ranking</div>
          <div id="dash-highest-rank" style="font-size:12px; color:var(--c-green);"></div>
        </div>

        <!-- Points -->
        <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:24px 22px;">
          <div id="dash-points" style="font-size:40px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:12px;">0</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Points</div>
          <div id="dash-points-week" style="font-size:12px; color:var(--c-green);"></div>
        </div>

        <!-- Matches -->
        <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:24px 22px;">
          <div id="dash-matches-count" style="font-size:40px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:12px;">0</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Matches</div>
          <div id="dash-wl" style="font-size:12px; color:var(--c-text-dim);"></div>
        </div>

        <!-- Win Rate -->
        <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:24px 22px;">
          <div id="dash-winrate" style="font-size:40px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:12px;">0%</div>
          <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Win rate</div>
          <div style="font-size:12px; color:var(--c-text-dim);">&nbsp;</div>
        </div>

        <!-- Right action column -->
        <div class="dash-actions-col" style="display:flex; flex-direction:column; gap:12px;">
          <!-- Upcoming Matches Banner -->
          <button id="dash-upcoming-btn" onclick="Router.navigate('/matches')" style="background:var(--g-primary); border:none; border-radius:var(--r-lg); padding:24px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:18px; font-weight:800; color:#fff; transition:opacity 0.2s; text-align:left;" onmouseover="this.style.opacity=0.9" onmouseout="this.style.opacity=1">
            <span style="display:flex; align-items:center; gap:12px;">
              <span style="font-size:24px;">🔥</span>
              <span><span id="dash-upcoming-count">0</span> Upcoming Matches</span>
            </span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <!-- Create / Join -->
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <button onclick="Router.navigate('/matches/create')" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:20px; font-size:16px; font-weight:700; color:var(--c-text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.2s;" onmouseover="this.style.background='var(--c-bg-secondary)'" onmouseout="this.style.background='var(--c-bg-card)'">
              <span style="font-size:20px;">🎾</span> Create
            </button>
            <button onclick="Router.navigate('/matches/join')" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:20px; font-size:16px; font-weight:700; color:var(--c-text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.2s;" onmouseover="this.style.background='var(--c-bg-secondary)'" onmouseout="this.style.background='var(--c-bg-card)'">
              <span style="font-size:20px;">🔍</span> Join
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════
         MAIN CONTENT: RANKING + LATEST MATCHES
    ═══════════════════════════════════════════ -->
    <div class="dash-main-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:80px; padding:40px 0; align-items: stretch;">

      <!-- LEFT: RANKING -->
      <div style="display:flex; flex-direction:column; border-right:1px solid var(--c-border); padding-right:40px; margin-right:-40px;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
          <img src="assets/logo_ico.png" style="height:20px; width:auto; opacity:0.6;">
          <span style="font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted);">Ranking</span>
        </div>

        <!-- Gender Tabs -->
        <div style="display:flex; gap:32px; border-bottom:1px solid var(--c-border); margin-bottom:24px;">
          <span id="tab-males" onclick="DashboardController.switchRankTab('male')" style="font-size:16px; font-weight:700; padding-bottom:16px; cursor:pointer; border-bottom:2.5px solid var(--c-primary); color:var(--c-text); margin-bottom:-1.5px;">Males</span>
          <span id="tab-females" onclick="DashboardController.switchRankTab('female')" style="font-size:16px; font-weight:700; padding-bottom:16px; cursor:pointer; border-bottom:2.5px solid transparent; color:var(--c-text-muted); margin-bottom:-1.5px;">Females</span>
        </div>

        <!-- Table header -->
        <div style="display:grid; grid-template-columns:50px 1fr 60px 80px 50px; padding:0 10px 14px; color:var(--c-text-muted); font-size:13px; font-weight:700; border-bottom:1px solid var(--c-border); margin-bottom:12px;">
          <span>Rank</span><span>Player</span><span style="text-align:center;">Age</span><span style="text-align:right;">Points</span><span style="text-align:right;">+/-</span>
        </div>

        <!-- Ranking rows -->
        <div id="dash-ranking-list" style="flex:1; min-height:360px;">
          <div class="skeleton" style="height:54px; border-radius:10px; margin-bottom:8px;"></div>
          <div class="skeleton" style="height:54px; border-radius:10px; margin-bottom:8px;"></div>
          <div class="skeleton" style="height:54px; border-radius:10px; margin-bottom:8px;"></div>
          <div class="skeleton" style="height:54px; border-radius:10px; margin-bottom:8px;"></div>
          <div class="skeleton" style="height:54px; border-radius:10px; margin-bottom:8px;"></div>
        </div>

        <button onclick="Router.navigate('/ranking')" class="btn btn-primary" style="margin-top:24px; padding:16px; font-size:15px; width:100%;">Full Ranking</button>
      </div>

      <!-- RIGHT: LATEST MATCHES -->
      <div style="display:flex; flex-direction:column;">
        <div style="margin-bottom:24px;">
          <span style="font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted);">Latest Matches</span>
        </div>

        <!-- Match Tabs -->
        <div style="display:flex; gap:32px; border-bottom:1px solid var(--c-border); margin-bottom:24px;">
          <span id="tab-completed" onclick="DashboardController.switchMatchTab('completed')" style="font-size:16px; font-weight:700; padding-bottom:16px; cursor:pointer; border-bottom:2.5px solid var(--c-primary); color:var(--c-text); margin-bottom:-1.5px;">Completed</span>
          <span id="tab-upcoming" onclick="DashboardController.switchMatchTab('upcoming')" style="font-size:16px; font-weight:700; padding-bottom:16px; cursor:pointer; border-bottom:2.5px solid transparent; color:var(--c-text-muted); margin-bottom:-1.5px;">Upcoming</span>
        </div>

        <!-- Match Cards -->
        <div id="dash-matches-list" style="flex:1; min-height:360px;">
          <div class="skeleton" style="height:100px; border-radius:14px; margin-bottom:12px;"></div>
          <div class="skeleton" style="height:100px; border-radius:14px; margin-bottom:12px;"></div>
          <div class="skeleton" style="height:100px; border-radius:14px; margin-bottom:12px;"></div>
        </div>

        <button onclick="Router.navigate('/matches')" class="btn btn-primary" style="margin-top:24px; padding:16px; font-size:15px; width:100%;">All Matches</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════
         FOOTER
    ═══════════════════════════════════════════ -->
    <div style="display:flex; align-items:center; padding:40px 0 60px; gap:20px; border-top:1px solid var(--c-border);">
      <button style="background:transparent; border:1px solid var(--c-primary); border-radius:12px; padding:12px 32px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.background='rgba(27,82,206,0.1)'; this.style.transform='translateY(-1px)'" onmouseout="this.style.background='transparent'; this.style.transform='translateY(0)'">Report a problem</button>
      <button style="background:transparent; border:1px solid var(--c-primary); border-radius:12px; padding:12px 32px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.background='rgba(27,82,206,0.1)'; this.style.transform='translateY(-1px)'" onmouseout="this.style.background='transparent'; this.style.transform='translateY(0)'">Contact Padeladd</button>
      <span style="margin-left:auto; font-size:14px; color:var(--c-text-muted);">Check our <a href="#" style="color:var(--c-orange); font-weight:600; text-decoration:none;">terms of use</a></span>
    </div>

  </div> <!-- end container -->

</div>
