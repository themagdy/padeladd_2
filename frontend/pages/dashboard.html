<div class="page active" id="dashboard-page">

  <!-- ═══════════════════════════════════════════
       TOP NAV
  ═══════════════════════════════════════════ -->
  <nav style="display:flex; align-items:center; padding:0 40px; height:70px; background:var(--c-bg); border-bottom:1px solid var(--c-border); position:sticky; top:0; z-index:100;">
    <!-- Logo -->
    <div style="display:flex; align-items:center; gap:12px; min-width:180px;">
      <img src="assets/logo_ico.png" style="height:36px; width:auto;">
      <span style="font-size:20px; font-weight:800; letter-spacing:-0.5px;">Padeladd</span>
    </div>

    <!-- Nav Links -->
    <div style="display:flex; align-items:center; gap:36px; margin:0 auto;">
      <a href="#" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; opacity:0.7; transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="9" height="9"/><rect x="13" y="2" width="9" height="9"/><rect x="2" y="13" width="9" height="9"/><rect x="13" y="13" width="9" height="9"/></svg>
        <span style="font-size:10px; font-weight:700; letter-spacing:1px; color:var(--c-text);">RANK</span>
      </a>
      <a href="#" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; opacity:0.7; transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <span style="font-size:10px; font-weight:700; letter-spacing:1px; color:var(--c-text);">PLAY</span>
      </a>
      <a href="#" style="display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; opacity:0.7; transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        <span style="font-size:10px; font-weight:700; letter-spacing:1px; color:var(--c-text);">MATCHES</span>
      </a>
    </div>

    <!-- Right: Avatar + Notif -->
    <div style="display:flex; align-items:center; gap:14px; min-width:180px; justify-content:flex-end;">
      <div id="nav-avatar" onclick="Router.navigate('/profile/view')" style="width:42px; height:42px; border-radius:50%; background:var(--g-primary); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; color:#fff; cursor:pointer; border:2px solid var(--c-border); flex-shrink:0;">?</div>
      <div style="position:relative; cursor:pointer;">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--c-orange)" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span style="position:absolute; top:-4px; right:-4px; background:var(--c-orange); color:#fff; font-size:9px; font-weight:800; border-radius:50%; width:16px; height:16px; display:flex; align-items:center; justify-content:center;">0</span>
      </div>
      <button onclick="API.post('/logout').then(() => { Auth.clearAll(); Router.navigate('/login'); })" style="background:transparent; border:none; color:var(--c-text-muted); font-size:12px; font-weight:600; cursor:pointer; padding:6px 10px; border-radius:6px; transition:background 0.2s;" onmouseover="this.style.background='var(--c-bg-secondary)'" onmouseout="this.style.background='transparent'">Sign out</button>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════
       WELCOME + STATS SECTION
  ═══════════════════════════════════════════ -->
  <div style="padding:40px 40px 32px; border-bottom:1px solid var(--c-border);">
    <h1 style="font-size:28px; font-weight:400; margin-bottom:6px;">Welcome back, <strong id="dash-name" style="font-weight:800;">Player</strong></h1>
    <p style="color:var(--c-text-muted); font-size:14px; margin-bottom:28px;">Here's your padel overview</p>

    <!-- Stats + Actions grid -->
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr 320px; gap:14px; align-items:stretch;">

      <!-- Ranking -->
      <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:22px 20px;">
        <div id="dash-ranking" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">—</div>
        <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Ranking</div>
        <div id="dash-highest-rank" style="font-size:12px; color:var(--c-orange);"></div>
      </div>

      <!-- Points -->
      <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:22px 20px;">
        <div id="dash-points" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">0</div>
        <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Points</div>
        <div id="dash-points-week" style="font-size:12px; color:var(--c-green);"></div>
      </div>

      <!-- Matches -->
      <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:22px 20px;">
        <div id="dash-matches-count" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">0</div>
        <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Matches</div>
        <div id="dash-wl" style="font-size:12px; color:var(--c-text-dim);"></div>
      </div>

      <!-- Win Rate -->
      <div style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:22px 20px;">
        <div id="dash-winrate" style="font-size:36px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:10px;">0%</div>
        <div style="font-size:14px; font-weight:600; color:var(--c-text); margin-bottom:4px;">Win rate</div>
        <div style="font-size:12px; color:var(--c-text-dim);">&nbsp;</div>
      </div>

      <!-- Right action column -->
      <div style="display:flex; flex-direction:column; gap:12px;">
        <!-- Upcoming Matches Banner -->
        <button id="dash-upcoming-btn" onclick="Router.navigate('/matches')" style="background:var(--g-primary); border:none; border-radius:var(--r-lg); padding:18px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:15px; font-weight:700; color:#fff; transition:opacity 0.2s;" onmouseover="this.style.opacity=0.9" onmouseout="this.style.opacity=1">
          <span>🔥 <span id="dash-upcoming-count">0</span> Upcoming Matches</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <!-- Create / Join -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <button onclick="Router.navigate('/matches/create')" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:16px; font-size:14px; font-weight:700; color:var(--c-text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background 0.2s;" onmouseover="this.style.background='var(--c-bg-secondary)'" onmouseout="this.style.background='var(--c-bg-card)'">
            🎾 Create
          </button>
          <button onclick="Router.navigate('/matches/join')" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:16px; font-size:14px; font-weight:700; color:var(--c-text); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background 0.2s;" onmouseover="this.style.background='var(--c-bg-secondary)'" onmouseout="this.style.background='var(--c-bg-card)'">
            🔍 Join
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT: RANKING + LATEST MATCHES
  ═══════════════════════════════════════════ -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:0; padding:40px 40px 0; border-bottom:1px solid var(--c-border);">

    <!-- LEFT: RANKING -->
    <div style="padding-right:40px; border-right:1px solid var(--c-border);">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
        <img src="assets/logo_ico.png" style="height:20px; width:auto; opacity:0.6;">
        <span style="font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted);">Ranking</span>
      </div>

      <!-- Gender Tabs -->
      <div style="display:flex; gap:24px; border-bottom:1px solid var(--c-border); margin-bottom:20px;">
        <span id="tab-males" onclick="DashboardController.switchRankTab('male')" style="font-size:15px; font-weight:700; padding-bottom:14px; cursor:pointer; border-bottom:2px solid var(--c-primary); color:var(--c-text); margin-bottom:-1px;">Males</span>
        <span id="tab-females" onclick="DashboardController.switchRankTab('female')" style="font-size:15px; font-weight:700; padding-bottom:14px; cursor:pointer; border-bottom:2px solid transparent; color:var(--c-text-muted); margin-bottom:-1px;">Females</span>
      </div>

      <!-- Table header -->
      <div style="display:grid; grid-template-columns:50px 1fr 60px 70px 50px; padding:0 10px 12px; color:var(--c-text-muted); font-size:12px; font-weight:700; border-bottom:1px solid var(--c-border); margin-bottom:8px;">
        <span>Rank</span><span>Player</span><span style="text-align:center;">Age</span><span style="text-align:right;">Points</span><span style="text-align:right;">+/-</span>
      </div>

      <!-- Ranking rows -->
      <div id="dash-ranking-list" style="min-height:300px;">
        <div class="skeleton" style="height:48px; border-radius:8px; margin-bottom:6px;"></div>
        <div class="skeleton" style="height:48px; border-radius:8px; margin-bottom:6px;"></div>
        <div class="skeleton" style="height:48px; border-radius:8px; margin-bottom:6px;"></div>
        <div class="skeleton" style="height:48px; border-radius:8px; margin-bottom:6px;"></div>
        <div class="skeleton" style="height:48px; border-radius:8px; margin-bottom:6px;"></div>
      </div>

      <button onclick="Router.navigate('/ranking')" class="btn btn-primary" style="margin-top:20px; margin-bottom:40px;">Full Ranking</button>
    </div>

    <!-- RIGHT: LATEST MATCHES -->
    <div style="padding-left:40px;">
      <div style="margin-bottom:20px;">
        <span style="font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted);">Latest Matches</span>
      </div>

      <!-- Match Tabs -->
      <div style="display:flex; gap:24px; border-bottom:1px solid var(--c-border); margin-bottom:20px;">
        <span id="tab-completed" onclick="DashboardController.switchMatchTab('completed')" style="font-size:15px; font-weight:700; padding-bottom:14px; cursor:pointer; border-bottom:2px solid var(--c-primary); color:var(--c-text); margin-bottom:-1px;">Completed</span>
        <span id="tab-upcoming" onclick="DashboardController.switchMatchTab('upcoming')" style="font-size:15px; font-weight:700; padding-bottom:14px; cursor:pointer; border-bottom:2px solid transparent; color:var(--c-text-muted); margin-bottom:-1px;">Upcoming</span>
      </div>

      <!-- Match Cards -->
      <div id="dash-matches-list" style="min-height:300px;">
        <div class="skeleton" style="height:90px; border-radius:12px; margin-bottom:10px;"></div>
        <div class="skeleton" style="height:90px; border-radius:12px; margin-bottom:10px;"></div>
        <div class="skeleton" style="height:90px; border-radius:12px; margin-bottom:10px;"></div>
      </div>

      <button onclick="Router.navigate('/matches')" class="btn btn-primary" style="margin-top:20px; margin-bottom:40px;">All Matches</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <div style="display:flex; align-items:center; padding:28px 40px; gap:16px;">
    <button style="background:transparent; border:1px solid var(--c-border); border-radius:var(--r-md); padding:10px 20px; color:var(--c-text); font-size:13px; font-weight:600; cursor:pointer; transition:background 0.2s;" onmouseover="this.style.background='var(--c-bg-card)'" onmouseout="this.style.background='transparent'">Report a problem</button>
    <button style="background:transparent; border:1px solid var(--c-border); border-radius:var(--r-md); padding:10px 20px; color:var(--c-text); font-size:13px; font-weight:600; cursor:pointer; transition:background 0.2s;" onmouseover="this.style.background='var(--c-bg-card)'" onmouseout="this.style.background='transparent'">Contact Padeladd</button>
    <span style="margin-left:auto; font-size:13px; color:var(--c-text-muted);">Check our <a href="#" style="color:var(--c-orange); font-weight:600; text-decoration:none;">terms of use</a></span>
  </div>

</div>
