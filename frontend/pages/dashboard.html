<div class="page active" id="dashboard-page" style="padding-bottom: calc(var(--bottom-nav-h) + 16px);">

  <!-- TOP NAV -->
  <nav style="display:flex; align-items:center; justify-content:space-between; padding: 16px 20px; background:var(--c-bg); border-bottom:1px solid var(--c-border); position:sticky; top:0; z-index:100; backdrop-filter:blur(10px);">
    <div style="display:flex; align-items:center; gap:10px;">
      <img src="assets/logo_ico.png" style="height:32px; width:auto;">
      <span style="font-size:18px; font-weight:800; letter-spacing:-0.5px;">Padeladd</span>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
      <button class="notif-btn" onclick="Router.navigate('/profile/view')" style="background:transparent; border:none; cursor:pointer;">
        <div id="dash-avatar" style="width:36px; height:36px; border-radius:50%; background:var(--g-primary); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:#fff; flex-shrink:0;">?</div>
      </button>
    </div>
  </nav>

  <!-- WELCOME BANNER -->
  <div style="padding: 24px 20px 0;">
    <h1 style="font-size:26px; font-weight:400; letter-spacing:-0.5px; margin-bottom:4px;">
      Welcome back, <span id="dash-name" style="font-weight:800;">Player</span>
    </h1>
    <p style="color:var(--c-text-muted); font-size:14px; margin-bottom:24px;">Here's your padel overview</p>

    <!-- STATS ROW -->
    <div class="dash-stats-row stagger" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
      <div class="stat-box" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:18px; border-left:3px solid var(--c-orange);">
        <div id="dash-ranking" class="val" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:6px;">—</div>
        <div class="lbl" style="font-size:13px; font-weight:600; color:var(--c-text);">Ranking</div>
        <div id="dash-highest-rank" class="sub" style="font-size:11px; color:var(--c-text-dim); margin-top:4px;"></div>
      </div>
      <div class="stat-box" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:18px; border-left:3px solid var(--c-orange);">
        <div id="dash-points" class="val" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:6px;">0</div>
        <div class="lbl" style="font-size:13px; font-weight:600; color:var(--c-text);">Points</div>
        <div id="dash-points-week" class="sub" style="font-size:11px; color:var(--c-text-dim); margin-top:4px;"></div>
      </div>
      <div class="stat-box" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:18px; border-left:3px solid var(--c-orange);">
        <div id="dash-matches" class="val" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:6px;">0</div>
        <div class="lbl" style="font-size:13px; font-weight:600; color:var(--c-text);">Matches</div>
        <div id="dash-wl" class="sub" style="font-size:11px; color:var(--c-text-dim); margin-top:4px;"></div>
      </div>
      <div class="stat-box" style="background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:18px; border-left:3px solid var(--c-orange);">
        <div id="dash-winrate" class="val" style="font-size:32px; font-weight:800; color:var(--c-orange); line-height:1; margin-bottom:6px;">0%</div>
        <div class="lbl" style="font-size:13px; font-weight:600; color:var(--c-text);">Win Rate</div>
        <div class="sub" style="font-size:11px; color:var(--c-text-dim); margin-top:4px;">&nbsp;</div>
      </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:28px;">
      <button class="btn btn-secondary" onclick="Router.navigate('/matches/create')" style="display:flex; align-items:center; justify-content:center; gap:8px; padding:14px;">
        <span style="font-size:18px;">🎾</span> Create
      </button>
      <button class="btn btn-secondary" onclick="Router.navigate('/matches/join')" style="display:flex; align-items:center; justify-content:center; gap:8px; padding:14px;">
        <span style="font-size:18px;">🔍</span> Join
      </button>
    </div>
  </div>

  <!-- RECENT MATCHES -->
  <div style="padding: 0 20px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h2 style="font-size:14px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--c-text-muted);">Latest Matches</h2>
      <span style="font-size:12px; color:var(--c-primary); font-weight:700; cursor:pointer;" onclick="Router.navigate('/matches')">See all</span>
    </div>

    <div id="dash-matches-list">
      <!-- Skeleton loaders -->
      <div class="skeleton" style="height:80px; border-radius:var(--r-lg); margin-bottom:10px;"></div>
      <div class="skeleton" style="height:80px; border-radius:var(--r-lg); margin-bottom:10px;"></div>
    </div>
  </div>

  <!-- PROFILE QUICK LINK -->
  <div style="padding: 20px 20px 0;">
    <button class="btn btn-secondary" onclick="Router.navigate('/profile/view')" style="display:flex; align-items:center; gap:10px; padding:16px;">
      <span style="font-size:20px;">👤</span>
      <div style="text-align:left;">
        <div style="font-weight:700; font-size:14px;">My Profile</div>
        <div id="dash-player-code" style="font-size:11px; color:var(--c-text-muted); font-weight:500;"></div>
      </div>
      <svg style="margin-left:auto;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>

</div>
