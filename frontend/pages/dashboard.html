<div class="page active" id="dashboard-page" style="background:var(--c-bg); overflow-x:hidden; padding-bottom: 60px;">

  <div style="width:100%; max-width:1200px; margin:0 auto; padding:0 20px;">

    <!-- ═══════════════════════════════════════════
         WELCOME + STATS SECTION
    ═══════════════════════════════════════════ -->
    <div class="dash-welcome" style="border-bottom: 1px solid var(--c-border);">
      <div class="dash-hero">
        <h1 class="dash-title" style="font-size:46px; font-weight:400; margin-bottom: -2px; color:#fff; line-height:0.95;">
          Hello <strong id="dash-name" style="font-weight:800;"></strong> 🥷</h1>
        <p id="dash-subtitle" style="color:var(--c-text-muted); font-size:18px; margin-top:3px; margin-left:2px; margin-bottom:16px; min-height:1.2em;">
        </p>
      </div>

      <!-- Stories Tray -->
      <div id="story-tray" class="story-tray"></div>

      <!-- Stats + Actions grid -->
      <div class="dash-stats-grid"
        style="display:grid; grid-template-columns:repeat(4, 1fr) 320px; gap:12px; align-items:stretch;">

        <!-- Ranking -->
        <div class="stat-box">
          <div>
            <div id="dash-ranking" class="val">—</div>
            <div class="lbl">Ranking</div>
            <div id="dash-highest-rank" class="sub green"></div>
          </div>
          <div class="ico">
            <img src="assets/icons/trophy_3d.png" alt="Trophy">
          </div>
        </div>

        <!-- Points -->
        <div class="stat-box">
          <div>
            <div id="dash-points" class="val">0</div>
            <div class="lbl">Points</div>
            <div id="dash-points-week" class="sub green"></div>
          </div>
          <div class="ico">
            <img src="assets/icons/coin_3d.png" alt="Points">
          </div>
        </div>

        <!-- Matches -->
        <div class="stat-box">
          <div>
            <div id="dash-matches-count" class="val">0</div>
            <div class="lbl">Matches</div>
            <div id="dash-wl" class="sub dim"></div>
          </div>
          <div class="ico">
            <img src="assets/icons/padel_racket_3d.png" style="border-radius: 6px;" alt="Matches">
          </div>
        </div>

        <!-- Win Rate -->
        <div class="stat-box">
          <div>
            <div id="dash-winrate" class="val">0%</div>
            <div class="lbl">Win rate</div>
            <div class="sub"></div>
          </div>
          <div class="ico">
            <img src="assets/icons/bullseye_3d.png" alt="Win Rate">
          </div>
        </div>

        <!-- Right action column -->
        <div class="dash-actions-col" style="display:flex; flex-direction:column; gap:12px; flex:1;">
          <!-- Upcoming Matches Banner -->
          <button id="dash-upcoming-btn"
            onclick="sessionStorage.setItem('last_sub_tab_mine', 'mine_upcoming'); Router.navigate('/matches/my')"
            class="btn"
            style="background:linear-gradient(135deg, #1b52ce, #0d3ba1); color:#fff; display:flex; align-items:center; justify-content:space-between; flex:1; padding:18px 24px; border-radius:var(--r-lg); border:none; box-shadow:0 8px 16px rgba(0,0,0,0.15); width:100%;"
            onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">
            <div style="display:flex; flex-direction:column; align-items:flex-start; gap:2px;">
              <div style="font-size:15px; font-weight:800; letter-spacing:0.5px;">MY MATCHES</div>
              <div style="font-size:12px; opacity:0.9; font-weight:600;">View your schedule</div>
            </div>
            <div style="display:flex; align-items:center; justify-content:center; width:36px; height:36px;"><img
                src="assets/icons/fire_3d.png" style="width:36px; height:36px; object-fit:contain;" alt="My Matches">
            </div>
          </button>
          <!-- Create / Join -->
          <div class="dash-action-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px; flex:0.8;">
            <button onclick="Router.navigate('/matches/create')" class="btn"
              style="background:var(--c-bg-card); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 20px; min-height:50px; border-radius:var(--r-lg);"
              onmouseover="this.style.background='#344154'" onmouseout="this.style.background='var(--c-bg-card)'">
              <span style="font-size:13px; font-weight:800; letter-spacing:0.5px;">CREATE</span>
              <div style="display:flex; align-items:center; justify-content:center; width:24px; height:24px;"><img
                  src="assets/icons/sparkles_3d.png" style="width:24px; height:24px; object-fit:contain;" alt="Create">
              </div>
            </button>
            <button onclick="Router.navigate('/matches')" class="btn"
              style="background:var(--c-bg-card); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 20px; min-height:50px; border-radius:var(--r-lg);"
              onmouseover="this.style.background='#344154'" onmouseout="this.style.background='var(--c-bg-card)'">
              <span style="font-size:13px; font-weight:800; letter-spacing:0.5px;">JOIN</span>
              <div style="display:flex; align-items:center; justify-content:center; width:24px; height:24px;"><img
                  src="assets/icons/magnifying_glass_3d.png" style="width:24px; height:24px; object-fit:contain;"
                  alt="Join"></div>
            </button>
          </div>
        </div>
      </div>

      <!-- Viral Invite Button Container -->
      <div id="dash-invite-row" style="display:none; width:100%; margin-top:16px;">
        <button id="btn-dash-invite" class="btn"
          style="background:rgba(255,255,255,0.02); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.06); border-right:3px solid var(--c-orange); display:flex; align-items:center; justify-content:space-between; font-weight:700; font-size:13px; letter-spacing:0.5px; text-transform:uppercase; padding:16px 24px; border-radius:var(--r-lg); width:100%; cursor:pointer; transition:all 0.25s cubic-bezier(0.16, 1, 0.3, 1); box-shadow:0 8px 32px rgba(0,0,0,0.15); color:#fff;"
          onmouseover="this.style.background='rgba(255,255,255,0.04)'; this.style.transform='translateY(-1px)';"
          onmouseout="this.style.background='rgba(255,255,255,0.02)'; this.style.transform='translateY(0)';">
          <span>Share Exclusive Invites</span>
          <span style="color:var(--c-orange); display:flex; align-items:center; gap:6px;">(3 Left) <span
              style="font-size:16px;">🎟️</span></span>
        </button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════
         MAIN CONTENT: RANKING + LATEST MATCHES
    ═══════════════════════════════════════════ -->
    <div class="dash-main-grid" style="padding:40px 0;">

      <!-- LEFT: RANKING -->
      <div class="dash-ranking-section">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
          <img src="assets/logo_ico.png" style="height:20px; width:auto;">
          <span class="section-title" style="font-size:12px;">The Padel Ladder</span>
        </div>

        <!-- Gender Tabs -->
        <div style="display:flex; gap:32px; border-bottom:1px solid var(--c-border); margin-bottom:24px;">
          <span id="tab-males" onclick="DashboardController.switchRankTab('male')"
            style="font-size:16px; font-weight:600; padding-bottom:16px; cursor:pointer; border-bottom:3px solid var(--c-primary); color:var(--c-text); margin-bottom:-3px;">Men</span>
          <span id="tab-females" onclick="DashboardController.switchRankTab('female')"
            style="font-size:16px; font-weight:600; padding-bottom:16px; cursor:pointer; border-bottom:3px solid transparent; color:var(--c-text-muted); margin-bottom:-3px;">Women</span>
        </div>

        <!-- Table header -->
        <div class="rank-grid-dash rank-table-header"
          style="padding:0 10px 14px 8px; color:var(--c-text-muted); font-size:11px; font-weight:700; margin-bottom:12px; border-bottom:1px solid var(--c-border);">
          <span style="text-align:center;">Rank</span><span>Player</span><span style="text-align:center;"
            class="hide-mobile">Age</span><span style="text-align:right;">Points</span><span style="text-align:right;"
            class="hide-mobile">+/-</span>
        </div>

        <!-- Ranking rows -->
        <div id="dash-ranking-list" style="flex:1; min-height:360px;">
          <div
            style="padding:14px 10px; display:grid; grid-template-columns: 40px 1fr 60px; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,0.05); overflow:hidden;">
            <div style="display:flex; justify-content:center;">
              <div class="skeleton" style="width:24px; height:24px; border-radius:50%; opacity:0.3;"></div>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <div class="skeleton" style="width:36px; height:36px; border-radius:50%; flex-shrink:0;"></div>
              <div style="display:flex; flex-direction:column; gap:6px; flex:1;">
                <div class="skeleton" style="width:120px; height:12px; border-radius:4px;"></div>
                <div class="skeleton" style="width:80px; height:10px; border-radius:4px; opacity:0.5;"></div>
              </div>
            </div>
            <div style="display:flex; justify-content:flex-end;">
              <div class="skeleton" style="width:40px; height:14px; border-radius:4px;"></div>
            </div>
          </div>
          <div
            style="padding:14px 10px; display:grid; grid-template-columns: 40px 1fr 60px; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,0.05); overflow:hidden;">
            <div style="display:flex; justify-content:center;">
              <div class="skeleton" style="width:24px; height:24px; border-radius:50%; opacity:0.3;"></div>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <div class="skeleton" style="width:36px; height:36px; border-radius:50%; flex-shrink:0;"></div>
              <div style="display:flex; flex-direction:column; gap:6px; flex:1;">
                <div class="skeleton" style="width:140px; height:12px; border-radius:4px;"></div>
                <div class="skeleton" style="width:60px; height:10px; border-radius:4px; opacity:0.5;"></div>
              </div>
            </div>
            <div style="display:flex; justify-content:flex-end;">
              <div class="skeleton" style="width:36px; height:14px; border-radius:4px;"></div>
            </div>
          </div>
        </div>

        <button onclick="Router.navigate('/ranking')" class="btn btn-primary" style="margin-top:24px;">Full
          Ranking</button>
      </div>

      <!-- RIGHT: LATEST MATCHES -->
      <div style="display:flex; flex-direction:column;">
        <div style="margin-bottom:24px;">
          <span class="section-title" style="font-size:12px;">Latest Matches</span>
        </div>

        <!-- Match Tabs -->
        <div style="display:flex; gap:32px; border-bottom:1px solid var(--c-border); margin-bottom:24px;">
          <span id="tab-completed" onclick="DashboardController.switchMatchTab('completed')"
            style="font-size:16px; font-weight:600; padding-bottom:16px; cursor:pointer; border-bottom:3px solid var(--c-primary); color:var(--c-text); margin-bottom:-3px;">Scores</span>
        </div>

        <!-- Match Cards -->
        <div id="dash-matches-list" style="flex:1; min-height:360px;">
          <div
            style="margin-bottom:12px; padding:16px; background:rgba(255,255,255,0.02); border-radius:var(--r-lg); border:1px solid rgba(255,255,255,0.05); overflow:hidden;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px; padding:0 4px;">
              <div class="skeleton" style="width:80px; height:10px; border-radius:4px; opacity:0.6;"></div>
              <div style="width:4px; height:4px; border-radius:50%; background:var(--c-border); opacity:0.3;"></div>
              <div class="skeleton" style="width:60px; height:10px; border-radius:4px; opacity:0.4;"></div>
            </div>
            <div style="display:flex; flex-direction:column; gap:8px;">
              <div
                style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.01); padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.02);">
                <div style="display:flex; align-items:center; gap:8px;">
                  <div style="width:10px; height:10px; border-radius:2px; background:var(--c-border); opacity:0.2;">
                  </div>
                  <div style="display:flex; gap:6px;">
                    <div class="skeleton" style="width:90px; height:12px; border-radius:4px;"></div>
                    <div class="skeleton" style="width:36px; height:12px; border-radius:4px; opacity:0.5;"></div>
                  </div>
                </div>
                <div style="display:flex; gap:10px;">
                  <div class="skeleton" style="width:14px; height:16px; border-radius:4px; opacity:0.8;"></div>
                  <div class="skeleton" style="width:14px; height:16px; border-radius:4px; opacity:0.4;"></div>
                </div>
              </div>
              <div
                style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.01); padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.02);">
                <div style="display:flex; align-items:center; gap:8px;">
                  <div style="width:10px; height:10px; border-radius:2px; background:transparent;"></div>
                  <div style="display:flex; gap:6px;">
                    <div class="skeleton" style="width:110px; height:12px; border-radius:4px;"></div>
                    <div class="skeleton" style="width:36px; height:12px; border-radius:4px; opacity:0.5;"></div>
                  </div>
                </div>
                <div style="display:flex; gap:10px;">
                  <div class="skeleton" style="width:14px; height:16px; border-radius:4px; opacity:0.4;"></div>
                  <div class="skeleton" style="width:14px; height:16px; border-radius:4px; opacity:0.8;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button onclick="sessionStorage.setItem('last_sub_tab_play', 'play_past'); Router.navigate('/matches')"
          class="btn btn-primary" style="margin-top:24px;">All Matches</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════
         FOOTER
    ═══════════════════════════════════════════ -->
    <div class="dash-footer" style="display:flex; align-items:center; padding:40px 0 20px; gap:20px;">
      <button onclick="DashboardController.reportProblem()"
        style="background:transparent; border:1px solid var(--c-border); border-radius: var(--r-md); padding:12px 32px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s;"
        onmouseover="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='translateY(-1px)'"
        onmouseout="this.style.background='transparent'; this.style.transform='translateY(0)'">Report a problem</button>
      <a href="https://www.instagram.com/thepadeladd/" target="_blank" rel="noopener noreferrer"
        style="display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box; text-decoration:none; outline:none; background:transparent; border:1px solid var(--c-border); border-radius: var(--r-md); padding:12px 32px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s;"
        onmouseover="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='translateY(-1px)'"
        onmouseout="this.style.background='transparent'; this.style.transform='translateY(0)'">Contact Padeladd</a>
      <span class="footer-bottom-text" style="margin-left:auto; font-size:14px; color:var(--c-text-muted);">Check our <a
          href="terms" data-link style="color:var(--c-orange); font-weight:600; text-decoration:none;">terms of
          use</a></span>
    </div>

  </div> <!-- end container -->

</div>

<style>
  #dashboard-page {
    padding-bottom: 50px !important;
  }

  @media (max-width: 992px) {
    #dashboard-page {
      padding-bottom: 50px !important;
    }

    .dash-stats-grid {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 10px !important;
    }

    .dash-actions-col {
      grid-column: 1 / -1 !important;
    }

    .dash-main-grid {
      grid-template-columns: 1fr !important;
      gap: 40px !important;
    }
  }

  @media (max-width: 600px) {
    .dash-welcome {
      padding: 24px 0 24px !important;
    }

    .dash-welcome p {
      margin-bottom: 24px !important;
    }

    .dash-main-grid {
      padding-top: 24px !important;
      padding-bottom: 24px !important;
    }

    .dash-footer {
      flex-direction: column !important;
      align-items: center !important;
      gap: 12px !important;
      padding-bottom: 20px !important;
    }

    .dash-footer .footer-bottom-text {
      margin-left: 0 !important;
      text-align: center;
      margin-top: 10px;
    }
  }
</style>


<style>
  .dash-welcome {
    padding: 30px 0 32px;
  }

  @media (min-width: 993px) {
    .dash-title {
      font-size: 36px !important;
    }
  }

  @media (max-width: 480px) {
    .dash-welcome {
      padding: 40px 0 32px !important;
    }
  }
</style>
