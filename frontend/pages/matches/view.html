<div class="page active" id="match-view-page" style="background:var(--c-bg);">
  <div style="width:100%; max-width:900px; margin:0 auto; padding:2px 20px 32px;">



    <!-- Loading skeleton -->
    <div id="mv-skeleton">
      <div class="skeleton" style="height:60px; border-radius:var(--r-md); margin-bottom:12px;"></div>
      <div class="skeleton" style="height:260px; border-radius:var(--r-lg); margin-bottom:12px;"></div>
      <div class="skeleton" style="height:120px; border-radius:var(--r-lg);"></div>
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="mv-content" style="display:none;">

      <!-- Match header -->
      <div style="margin-bottom:24px;">
        <div id="mv-status-badge" style="margin-bottom:10px;"></div>
        <h1 id="mv-title"></h1>
        <p id="mv-meta" style="color:var(--c-text-muted); font-size:14px;"></p>
      </div>

      <!-- Slots Card -->
      <div style="background:var(--g-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:20px; margin-bottom:20px;">

        <!-- Team Headers -->
        <div style="display:grid; grid-template-columns:1fr 50px 1fr; gap:0; margin-bottom:16px;">
          <div style="font-size:12px; font-weight:800; color:var(--c-orange); text-transform:uppercase; letter-spacing:1px; text-align:center; display:flex; flex-direction:column; gap:2px;">
            <span>Team 1</span>
            <span id="mv-team1-points" style="font-size:10px; opacity:0.6; font-weight:700;"></span>
          </div>
          <div></div>
          <div style="font-size:12px; font-weight:800; color:#fff; text-transform:uppercase; letter-spacing:1px; text-align:center; display:flex; flex-direction:column; gap:2px;">
            <span>Team 2</span>
            <span id="mv-team2-points" style="font-size:10px; opacity:0.6; font-weight:700;"></span>
          </div>
        </div>

        <!-- Team Slots & VS -->
        <div style="display:grid; grid-template-columns:1fr 50px 1fr; gap:0; align-items:center;">
          <!-- Team 1 Slots -->
          <div>
            <div id="mv-team1-slot1" class="mv-slot"></div>
            <div id="mv-team1-slot2" class="mv-slot" style="margin-top:12px;"></div>
          </div>
          
          <!-- VS divider -->
          <div class="match-vs-wrapper">
            <div class="match-vs-badge">
              <svg viewBox="0 0 255.83 378.35" style="width:42px; height:42px;">
                <defs>
                  <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#BF953F;stop-opacity:1" />
                    <stop offset="20%" style="stop-color:#FCF6BA;stop-opacity:1" />
                    <stop offset="40%" style="stop-color:#B38728;stop-opacity:1" />
                    <stop offset="60%" style="stop-color:#FBF5B7;stop-opacity:1" />
                    <stop offset="80%" style="stop-color:#AA771C;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#BF953F;stop-opacity:1" />
                  </linearGradient>
                </defs>
                <path fill="url(#goldGradient)" d="M27.05,377.8c4.31-5.27,8.61-10.55,13-15.8q18.75-22.68,37.55-45.34Q93.24,297.73,109,278.83c3.82-4.61,7.66-9.2,11.37-13.9,1.24-1.57,2.35-1.64,4.06-.86a87.62,87.62,0,0,0,55.34,6.46c12.25-2.54,22.81-8.3,30-19,7-10.46,8.81-26.43,2.16-36.66-4.34-6.66-10.7-11-17.81-14-7.79-3.32-15.84-6-23.76-9a19.25,19.25,0,0,1-3.57-1.72c-2-1.28-3.58-2.95-2.85-5.56a5.07,5.07,0,0,1,4.85-3.71,53.58,53.58,0,0,1,11.4.49c9.17,1.65,17.27,5.91,24.74,11.35,1.69,1.23,2.6,1,3.86-.49q9.44-11.46,19.06-22.78c1.34-1.57,1.33-2.48-.38-3.79a76,76,0,0,0-31.15-13.91,89.77,89.77,0,0,0-32.27-1,8.21,8.21,0,0,0-6.51,4.18Q143.16,178.59,128.41,202c-1.43,2.28-1.17,3.77.37,5.69,4.51,5.64,10.45,9.3,17,11.91,7.47,3,15.17,5.41,22.76,8.12a25.61,25.61,0,0,1,4.08,1.79,5.36,5.36,0,0,1,2.77,5.24,5.24,5.24,0,0,1-3.71,4.87,17.77,17.77,0,0,1-5.83,1c-13.22-.36-25-5-35.8-12.41-4-2.76-7.69-6.06-11.76-9.3-.45.64-1,1.32-1.46,2.07q-24,39-48,78c-1.14,1.85-2.09,2-4,.95Q27.12,278.2,10,238.21A123.77,123.77,0,0,1,.35,180c2.16-29.47,13.14-55.29,33-77.13A124.8,124.8,0,0,1,90.45,66.73,124,124,0,0,1,148,62.8c4.66.79,9.27,1.91,13.89,3a4.11,4.11,0,0,0,4.12-.92q20-18.11,40-36.14,15.4-13.84,30.86-27.64a3.66,3.66,0,0,1,2.36-1L98.42,176.91l-.72-.18c-.21-1.25-.52-2.49-.61-3.74-1.45-19.42-2.91-38.83-4.26-58.25-.16-2.23-.87-3-3.15-3-12.58.09-25.17.07-37.75,0-2.15,0-2.64.63-2.34,2.79,2.56,18.7,5,37.42,7.48,56.12,1.81,13.43,3.74,26.84,5.59,40.27.78,5.68,1.53,11.37,2.15,17.07.2,1.85.86,2.62,2.78,2.61,11.09-.05,22.17-.06,33.25,0,2,0,2.74-1.24,3.57-2.59q11.22-18.13,22.42-36.29,20.36-33,40.68-66,13-21.14,26.07-42.24c1.93-3.13,1.93-3.15,5-1.08A127.62,127.62,0,0,1,253.06,163a123.9,123.9,0,0,1-3.41,64.78c-10.49,32-30.67,56.39-60.08,72.93A123,123,0,0,1,148,314.89a132.93,132.93,0,0,1-36.35.62c-2.15-.26-4.3-.53-6.41-1a4.56,4.56,0,0,0-4.32,1.17Q70.24,342,39.47,368.28c-3.95,3.38-8,6.71-11.94,10.07Z"/>
              </svg>
            </div>
          </div>

          <!-- Team 2 Slots -->
          <div>
            <div id="mv-team2-slot1" class="mv-slot"></div>
            <div id="mv-team2-slot2" class="mv-slot" style="margin-top:12px;"></div>
          </div>
        </div>
      </div>

      <!-- Chat area (restricted to players) -->
      <div id="mv-chat-area"></div>

      <!-- Withdrawal Warning -->
      <div class="mv-withdrawal-warning">
        <div class="mvw-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        </div>
        <div class="mvw-content">
          <span class="mvw-en">No withdrawals within 6 hours</span>
          <span class="mvw-ar" dir="rtl">ممنوع الانسحاب خلال آخر ٦ ساعات</span>
        </div>
      </div>

      <!-- Action area (join solo / join team / pending info) -->
      <div id="mv-action-area" style="margin-bottom:20px;"></div>

      <!-- Join Team Form (hidden by default) -->
      <form id="mv-join-team-form" onsubmit="event.preventDefault(); MatchesController.submitTeamRequest()" style="display:none; background:var(--c-bg-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:20px;">
        <div style="font-size:13px; font-weight:700; margin-bottom:14px;">Send Team Join Request</div>
        <div class="form-group">
          <label class="form-label">Partner Player Code</label>
          <div style="position:relative;">
            <input type="text" id="mv-partner-code-input" class="form-input" placeholder="e.g. a123" maxlength="10" />
            
            <!-- Stylish Partner Badge Overlay -->
            <div id="mv-partner-badge" style="display:none; position:absolute; inset:0; background:var(--c-bg-card); border-radius:var(--r-md); border:1px solid var(--c-primary); z-index:10; align-items:center; justify-content:space-between; padding:0 14px;">
              <div style="display:flex; align-items:center; gap:8px;">
                <span id="mv-badge-code" style="font-weight:800; font-family:monospace; color:var(--c-primary); text-transform:uppercase; letter-spacing:1px;"></span>
                <span style="color:var(--c-text-muted); font-size:10px;">•</span>
                <span id="mv-badge-name" style="font-weight:600; color:#fff; font-size:14px;"></span>
              </div>
              <div id="mv-badge-clear" style="color:var(--c-text-muted); cursor:pointer; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:var(--c-bg-secondary); font-size:12px; transition:color 0.2s;">
                ✕
              </div>
            </div>
          </div>
          <span class="form-help" id="mv-partner-help">Your partner will receive a request to approve.</span>
        </div>
        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary" style="flex:1; font-size:14px; padding:12px;">Send Request</button>
          <button type="button" onclick="MatchesController.hideInvitePartner()" class="btn btn-secondary" style="flex:1; font-size:14px; padding:12px;">Cancel</button>

        </div>
      </form>

      <!-- Waiting List -->
      <div id="mv-waiting-section" style="display:none;">
        <div style="background:var(--g-card); border:1px solid var(--c-border); border-radius:var(--r-lg); padding:20px;">
          <div style="font-size:11px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted); margin-bottom:14px;">Waiting List</div>
        <div id="mv-waiting-list"></div>
      </div>
    </div>

    <!-- Policy Violation Area (for late withdrawals, etc.) -->
    <div id="mv-policy-area" style="margin-top:20px;"></div>

    </div><!-- /mv-content -->
  </div>

  <!-- Phase 5: Full-Screen Match Chat Overlay -->
  <div id="mv-chat-overlay" style="display:none; position:fixed; inset:0; background:var(--c-bg); z-index:2000; flex-direction:column; animation: chatSlideUp 0.3s ease-out; height:100dvh; align-items:center;">
    
    <!-- Chat Overlay Header -->
    <div style="width:100%; border-bottom:1px solid var(--c-border); background:var(--c-bg-card);">
      <div style="max-width:900px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:16px 20px;">
        <div style="display:flex; align-items:center; gap:16px;">
          <div onclick="ChatController.close()" style="cursor:pointer; width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(255,255,255,0.05); color:var(--c-text-muted); font-size:18px;">
            ✕
          </div>
          <div>
            <div id="mv-chat-title" style="font-size:16px; font-weight:800; color:var(--c-text);">Match Chat</div>
            <div id="chat-online-indicator" style="font-size:11px; color:var(--c-primary); display:none;">
              <span style="display:inline-block; width:6px; height:6px; background:var(--c-primary); border-radius:50%; margin-right:4px;"></span>Live
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="width:100%; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--c-border);">
      <div id="chat-player-bar" style="max-width:900px; margin:0 auto; padding:12px 20px; display:flex; gap:12px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;">
        <!-- Avatars will be injected here -->
      </div>
    </div>
    
    <!-- Inline Player Actions (Floating Overlay) -->
    <div id="chat-player-actions-bar" style="display:none; position:absolute; top:139px; left:0; right:0; background:linear-gradient(to right, #111827, #1F2937); border-bottom:1px solid rgba(255,255,255,0.1); z-index:1000; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);">

      <div style="max-width:900px; margin:0 auto; padding:10px 20px; display:flex; align-items:center; gap:15px; overflow-x:auto; scrollbar-width:none;">
        <div id="chat-selected-player-name" style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; color:#fff;"></div>
        <div id="chat-inline-actions" style="display:flex; align-items:center; gap:12px;"></div>
        <div onclick="ChatController.closePlayerMenu()" style="margin-left:auto; display:flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,0.05); font-size:12px; cursor:pointer; color:var(--c-text-muted); transition:background 0.2s;">✕</div>
      </div>
    </div>


    <!-- Messages Container -->

    <div id="chat-messages-container" style="width:100%; flex:1; overflow-y:auto; display:flex; flex-direction:column; align-items:center; scroll-behavior:smooth;">
      <div id="chat-messages-inner"
        style="width:100%; max-width:900px; padding:60px 20px 20px; display:flex; flex-direction:column; gap:0;">

        <div id="chat-empty-state"
 style="display:flex; align-items:center; justify-content:center; color:var(--c-text-muted); font-size:13px; text-align:center; padding:40px 0; flex:1;">
          No messages yet.<br>Be the first to say something! 🎾
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div style="width:100%; background:var(--c-bg-card); border-top:1px solid var(--c-border); padding-bottom:max(0px, env(safe-area-inset-bottom));">
      <div style="max-width:900px; margin:0 auto; padding:16px 20px;">
        <div style="display:flex; gap:10px; align-items:flex-end;">
          <textarea
            id="chat-input"
            placeholder="Type a message…"
            maxlength="500"
            rows="1"
            oninput="ChatController.autoResize(this)"
            onkeydown="ChatController.handleKey(event)"
            style="flex:1; background:var(--g-card); border:1px solid var(--c-border); border-radius:14px; padding:12px 16px; font-size:14px; color:var(--c-text); font-family:var(--font); resize:none; outline:none; line-height:1.4; max-height:100px; overflow:hidden; transition:border-color 0.2s;"
          ></textarea>
          <button
            id="chat-send-btn"
            onclick="ChatController.sendMessage()"
            style="background:var(--g-primary); border:none; border-radius:14px; width:46px; height:46px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:18px; transition:opacity 0.2s;"
          >➤</button>
        </div>
      </div>
    </div>

    </div>

  </div>

  <!-- Mobile-Friendly Player Menu (Bottom Sheet) -->
  <div id="chat-sheet-overlay" onclick="ChatController.closePlayerMenu()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:4000; backdrop-filter:blur(4px); transition:opacity 0.3s;"></div>
  
  <div id="chat-bottom-sheet" style="display:none; position:fixed; bottom:0; left:0; right:0; background:var(--c-bg-card); border-top:1px solid var(--c-border); border-radius:24px 24px 0 0; z-index:4001; padding:20px; transition:transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform:translateY(100%);">
    <div style="width:40px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin:0 auto 20px;"></div>
    <div id="chat-sheet-title" style="font-size:18px; font-weight:800; color:var(--c-text); margin-bottom:20px; text-align:center;">Player Name</div>
    <div id="chat-sheet-options" style="display:flex; flex-direction:column; gap:8px;">
        <!-- Options injected here -->
    </div>
    <div onclick="ChatController.closePlayerMenu()" style="margin-top:16px; padding:16px; text-align:center; font-weight:700; color:var(--c-text-muted); cursor:pointer;">Cancel</div>
  </div>


  <style>
    @keyframes chatSlideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }
    #chat-player-bar::-webkit-scrollbar {
        display: none;
    }
    .chat-player-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid transparent;
        transition: border-color 0.2s, transform 0.2s;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--g-card);
        font-size: 15px;
        font-weight: 700;
        color: var(--c-text);
        position: relative;
    }
    .chat-player-avatar:hover {
        border-color: var(--c-primary);
        transform: scale(1.05);
    }
    .chat-sheet-item {
        padding: 18px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--c-border);
        border-radius: 16px;
        font-size: 16px;
        font-weight: 700;
        color: var(--c-text);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: background 0.2s, transform 0.1s;
    }
    .chat-sheet-item:active {
        transform: scale(0.98);
        background: rgba(255,255,255,0.05);
    }
    
    /* Withdrawal Warning Styles */
    .mv-withdrawal-warning {
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: var(--r-md);
        padding: 14px 16px;
        margin-bottom: 20px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
    }
    .mvw-icon {
        color: #ef4444;
        width: 22px;
        height: 22px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
    }
    .mvw-icon svg {
        width: 100%;
        height: 100%;
    }
    .mvw-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .mvw-en {
        color: #ef4444;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.2px;
        line-height: 1.4;
        text-align: left;
    }
    .mvw-ar {
        color: #ef4444;
        font-size: 14.5px;
        font-weight: 700;
        font-family: system-ui, -apple-system, sans-serif;
        line-height: 1.4;
        text-align: left;
        padding-top: 10px;
        border-top: 1px dashed rgba(239, 68, 68, 0.25);
    }
    @media (min-width: 600px) {
        .mv-withdrawal-warning {
            align-items: center;
        }
        .mvw-icon {
            margin-top: 0;
        }
        .mvw-content {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .mvw-en, .mvw-ar {
            text-align: left;
        }
        .mvw-ar {
            padding-top: 0;
            border-top: none;
            text-align: right;
        }
    }
  </style>


</div>
