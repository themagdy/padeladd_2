<div class="page active" id="match-view-page" style="background:var(--c-bg);">
  <div style="width:100%; max-width:900px; margin:0 auto; padding:5px 20px 32px;">



    <!-- Loading skeleton -->
    <div id="mv-skeleton">
      <div style="margin-bottom:24px;">
        <div class="skeleton" style="width:100px; height:24px; border-radius:12px; margin-bottom:12px; opacity:0.2;">
        </div>
        <div class="skeleton" style="width:70%; height:32px; border-radius:8px; margin-bottom:8px;"></div>
        <div class="skeleton" style="width:40%; height:16px; border-radius:4px; opacity:0.5;"></div>
      </div>

      <div
        style="background:rgba(255,255,255,0.02); border-radius:var(--r-lg); padding:24px; border:1px solid rgba(255,255,255,0.05); margin-bottom:20px;">
        <div style="display:grid; grid-template-columns:1fr 50px 1fr; gap:0; align-items:center; margin-bottom:32px;">
          <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
            <div class="skeleton" style="width:60px; height:12px; border-radius:4px; opacity:0.4;"></div>
            <div class="skeleton" style="width:40px; height:10px; border-radius:4px; opacity:0.2;"></div>
          </div>
          <div></div>
          <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
            <div class="skeleton" style="width:60px; height:12px; border-radius:4px; opacity:0.4;"></div>
            <div class="skeleton" style="width:40px; height:10px; border-radius:4px; opacity:0.2;"></div>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 50px 1fr; gap:0; align-items:center;">
          <div style="display:flex; flex-direction:column; gap:12px;">
            <div class="skeleton" style="height:60px; border-radius:16px;"></div>
            <div class="skeleton" style="height:60px; border-radius:16px;"></div>
          </div>
          <div style="display:flex; justify-content:center; opacity:0.1;">
            <div style="width:36px; height:36px; background:var(--c-border); border-radius:50%;"></div>
          </div>
          <div style="display:flex; flex-direction:column; gap:12px;">
            <div class="skeleton" style="height:60px; border-radius:16px;"></div>
            <div class="skeleton" style="height:60px; border-radius:16px;"></div>
          </div>
        </div>
      </div>

      <div class="skeleton" style="height:100px; border-radius:var(--r-lg); opacity:0.3;"></div>
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="mv-content" style="display:none;">

      <!-- Match header -->
      <div style="margin-bottom:24px;">
        <div id="mv-status-badge" style="margin-bottom:10px;"></div>
        <h1 id="mv-title"></h1>
        <p id="mv-meta" style="color:var(--c-text-muted);"></p>
      </div>

      <!-- Slots Card -->
      <div style="background:var(--g-card); border-radius:var(--r-lg); padding:20px; margin-bottom:20px;">

        <!-- Team Headers -->
        <div style="display:grid; grid-template-columns:1fr 50px 1fr; gap:0; margin-bottom:16px;">
          <div
            style="font-size:12px; font-weight:800; color:var(--c-orange); text-transform:uppercase; letter-spacing:1px; text-align:center; display:flex; flex-direction:column; gap:2px;">
            <span>Team 1</span>
            <span id="mv-team1-points" style="font-size:10px; opacity:0.6; font-weight:700;"></span>
          </div>
          <div></div>
          <div
            style="font-size:12px; font-weight:800; color:#fff; text-transform:uppercase; letter-spacing:1px; text-align:center; display:flex; flex-direction:column; gap:2px;">
            <span>Team 2</span>
            <span id="mv-team2-points" style="font-size:10px; opacity:0.6; font-weight:700;"></span>
          </div>
        </div>

        <!-- Team Slots & VS -->
        <div style="display:grid; grid-template-columns:1fr 50px 1fr; gap:0; align-items:center;">
          <!-- Team 1 Slots -->
          <div>
            <div id="mv-team1-slot1" class="mv-slot"></div>
            <div id="mv-team1-slot2" class="mv-slot" style="margin-top:12px;"></div>
          </div>

          <!-- VS divider -->
          <div class="match-vs-wrapper">
            <div class="match-vs-badge" data-no-sound onclick="FX.ignite(this)">
              <div class="vs-fire-fx"></div>
              <img src="assets/vs.svg" style="width:35.64px; height:35.64px; object-fit:contain; border-radius: 50%;"
                alt="VS">
            </div>
          </div>

          <!-- Team 2 Slots -->
          <div>
            <div id="mv-team2-slot1" class="mv-slot"></div>
            <div id="mv-team2-slot2" class="mv-slot" style="margin-top:12px;"></div>
          </div>
        </div>

        <!-- Eligibility Range -->
        <div id="mv-eligibility-range"
          style="margin-top:20px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.05); display:none; align-items:center; justify-content:center; gap:8px;">
          <span
            style="font-size:10px; font-weight:900; color:var(--c-text-muted); text-transform:uppercase; letter-spacing:1px;">Eligibility:</span>
          <span id="mv-range-val"
            style="font-size:12px; font-weight:800; color:var(--c-text-muted); background:rgba(255,255,255,0.05); padding:2px 8px; border-radius:6px;"></span>
        </div>
      </div>

      <!-- Chat area (restricted to players) -->
      <div id="mv-chat-area"></div>

      <!-- Withdrawal Warning -->
      <div class="mv-withdrawal-warning">
        <div class="mvw-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </div>
        <div class="mvw-content">
          <span class="mvw-en">No withdrawals within 5 hours</span>
          <span class="mvw-ar" dir="rtl">ممنوع الانسحاب من ماتش كامل آخر ٥ ساعات</span>
        </div>
      </div>

      <!-- Action area (join solo / join team / pending info) -->
      <div id="mv-action-area" style="margin-bottom:20px;"></div>

      <!-- Join Team Form (hidden by default) -->
      <form id="mv-join-team-form" onsubmit="event.preventDefault(); MatchesController.submitTeamRequest()"
        style="display:none; background:var(--c-bg-card); border-radius:var(--r-lg); padding:20px;">
        <div style="font-size:13px; font-weight:700; margin-bottom:14px;">Send Team Join Request</div>
        <div class="form-group">
          <label class="form-label">Partner Player XCode</label>
          <div style="position:relative;">
            <input type="text" id="mv-partner-code-input" class="form-input" placeholder="e.g. A123" maxlength="7"
              style="border: 1px solid rgba(255,255,255,0.1);" />

          </div>
          <span class="form-help" id="mv-partner-help">Your partner will receive a request to approve.</span>
        </div>
        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary" style="flex:1; font-size:14px; padding:12px;">Send
            Request</button>
          <button type="button" onclick="MatchesController.hideInvitePartner()" class="btn btn-secondary"
            style="flex:1; font-size:14px; padding:12px;">Cancel</button>

        </div>
      </form>

      <!-- Waiting List -->
      <div id="mv-waiting-section" style="display:none;">
        <div style="background:var(--g-card); border-radius:var(--r-lg); padding:20px;">
          <div
            style="font-size:11px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:var(--c-text-muted); margin-bottom:14px;">
            Waiting List</div>
          <div id="mv-waiting-list"></div>
        </div>
      </div>

      <!-- Policy Violation Area (for late withdrawals, etc.) -->
      <div id="mv-policy-area" style="margin-top:20px;"></div>

    </div><!-- /mv-content -->
  </div>

  <!-- Phase 5: Full-Screen Match Chat Overlay -->
  <div id="mv-chat-overlay"
    style="display:none; position:fixed; inset:0; background:var(--c-bg); z-index:2000; flex-direction:column; animation: chatSlideUp 0.3s ease-out; height:100dvh; align-items:center;">

    <!-- Chat Overlay Header -->
    <div style="width:100%; background:var(--c-bg-card);">
      <div
        style="max-width:900px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:16px 20px;">
        <div style="display:flex; align-items:center; gap:16px;">
          <div onclick="ChatController.close()"
            style="cursor:pointer; width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(255,255,255,0.05); color:var(--c-text-muted); font-size:18px;">
            ✕
          </div>
          <div>
            <div id="mv-chat-title" style="font-size:16px; font-weight:800; color:var(--c-text);">Match Chat</div>
            <div id="chat-online-indicator" style="font-size:11px; color:var(--c-primary); display:none;">
              <span
                style="display:inline-block; width:6px; height:6px; background:var(--c-primary); border-radius:50%; margin-right:4px;"></span>Live
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="width:100%; background:rgba(255,255,255,0.02);">
      <div id="chat-player-bar"
        style="max-width:900px; margin:0 auto; padding:12px 20px; display:flex; gap:12px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; height:66px; align-items:center;">
        <!-- Avatars will be injected here -->
      </div>
    </div>

    <!-- Inline Player Actions (Floating Overlay) -->
    <div id="chat-player-actions-bar"
      style="display:none; position:absolute; top:139px; left:0; right:0; background:linear-gradient(to right, #111827, #1F2937); z-index:1000; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);">

      <div
        style="max-width:900px; margin:0 auto; padding:10px 20px; display:flex; align-items:center; gap:15px; overflow-x:auto; scrollbar-width:none;">
        <div id="chat-selected-player-name"
          style="display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; color:#fff;"></div>
        <div id="chat-inline-actions" style="display:flex; align-items:center; gap:12px;"></div>
        <div onclick="ChatController.closePlayerMenu()"
          style="margin-left:auto; display:flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,0.05); font-size:12px; cursor:pointer; color:var(--c-text-muted); transition:background 0.2s;">
          ✕</div>
      </div>
    </div>


    <!-- Messages Container -->

    <div id="chat-messages-container"
      style="width:100%; flex:1; overflow-y:auto; display:flex; flex-direction:column; align-items:center; scroll-behavior:smooth;">
      <div id="chat-messages-inner"
        style="width:100%; max-width:900px; padding:60px 20px 20px; display:flex; flex-direction:column; gap:0;">

        <div id="chat-empty-state"
          style="display:flex; align-items:center; justify-content:center; color:var(--c-text-muted); font-size:13px; text-align:center; padding:40px 0; flex:1;">
          No messages yet.<br>Be the first to say something! 🎾
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div style="width:100%; background:var(--c-bg-card); padding-bottom:max(0px, env(safe-area-inset-bottom));">
      <div style="max-width:900px; margin:0 auto; padding:16px 20px;">
        <div style="display:flex; gap:10px; align-items:flex-end;">
          <textarea id="chat-input" placeholder="Type a message…" maxlength="500" rows="1"
            oninput="ChatController.autoResize(this)" onkeydown="ChatController.handleKey(event)"
            style="flex:1; background:var(--g-card); border:1px solid var(--c-border); border-radius:14px; padding:12px 16px; font-size:14px; color:var(--c-text); font-family:var(--font); resize:none; outline:none; line-height:1.4; max-height:100px; overflow:hidden; transition:all 0.2s;"></textarea>
          <button id="chat-send-btn" onclick="ChatController.sendMessage()"
            style="background:var(--g-primary); border:none; border-radius:14px; width:46px; height:46px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:18px; transition:opacity 0.2s;">➤</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Mobile-Friendly Player Menu (Bottom Sheet) -->
<div id="chat-sheet-overlay" onclick="ChatController.closePlayerMenu()"
  style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:4000; backdrop-filter:blur(4px); transition:opacity 0.3s;">
</div>

<div id="chat-bottom-sheet"
  style="display:none; position:fixed; bottom:0; left:0; right:0; background:var(--c-bg-card); border-radius:24px 24px 0 0; z-index:4001; padding:20px; transition:transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform:translateY(100%);">
  <div style="width:40px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin:0 auto 20px;"></div>
  <div id="chat-sheet-title"
    style="font-size:18px; font-weight:800; color:var(--c-text); margin-bottom:20px; text-align:center;">Player Name
  </div>
  <div id="chat-sheet-options" style="display:flex; flex-direction:column; gap:8px;">
    <!-- Options injected here -->
  </div>
  <div onclick="ChatController.closePlayerMenu()"
    style="margin-top:16px; padding:16px; text-align:center; font-weight:700; color:var(--c-text-muted); cursor:pointer;">
    Cancel</div>
</div>


<style>
  #chat-input:focus {
    border-color: var(--c-primary) !important;
    background: rgba(255, 255, 255, 0.04) !important;
  }

  @keyframes chatSlideUp {
    from {
      transform: translateY(100%);
    }

    to {
      transform: translateY(0);
    }
  }

  #chat-player-bar::-webkit-scrollbar {
    display: none;
  }

  .chat-player-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--g-card);
    font-size: 15px;
    font-weight: 700;
    color: var(--c-text);
    position: relative;
  }

  .chat-player-avatar:hover {
    border-color: var(--c-primary);
    transform: scale(1.05);
  }

  .chat-sheet-item {
    padding: 18px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    color: var(--c-text);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.2s, transform 0.1s;
  }

  .chat-sheet-item:active {
    transform: scale(0.98);
    background: rgba(255, 255, 255, 0.05);
  }

  /* Withdrawal Warning Styles */
  .mv-withdrawal-warning {
    background: rgba(239, 68, 68, 0.08);
    border-radius: var(--r-md);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .mvw-icon {
    color: #ef4444;
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .mvw-icon svg {
    width: 100%;
    height: 100%;
  }

  .mvw-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .mvw-en {
    color: #ef4444;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2px;
    line-height: 1.4;
    text-align: left;
  }

  .mvw-ar {
    color: #ef4444;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Estedad', sans-serif;
    line-height: 1.4;
    text-align: left;
    padding-top: 2px;
  }

  @media (min-width: 600px) {
    .mv-withdrawal-warning {
      align-items: center;
    }

    .mvw-icon {
      margin-top: 0;
    }

    .mvw-content {
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .mvw-en,
    .mvw-ar {
      text-align: left;
    }

    .mvw-ar {
      padding-top: 0;
      border-top: none;
      text-align: right;
    }
  }
</style>


</div>
