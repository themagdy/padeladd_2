<div class="auth-page page active container" style="padding: 24px;">
    <div class="auth-logo" style="display:flex; justify-content:left; margin: 24px 0 24px 0;">
      <img src="assets/logo_ico.png" alt="Padeladd" style="width:38px; height:auto; object-fit:contain;">
    </div>
    <h1 class="auth-title" style="font-size:28px; font-weight:800; text-align:left;">Set New Password</h1>
    <p class="auth-subtitle" style="color:var(--c-text-muted); text-align:left; margin-bottom:30px;">Enter your new password below to regain access to your account.</p>

    <form id="reset-form" novalidate>
      <input type="hidden" name="token">
      
      <div class="form-group">
        <label class="form-label" for="reset-pass">New Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="reset-pass" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reset-pass-confirm">Confirm Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="reset-pass-confirm" name="password_confirm" placeholder="Confirm your new password" autocomplete="new-password" required>
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="btn-reset" style="margin-top: 15px;">Set New Password</button>

      <p class="text-center text-sm text-muted mt-md" style="margin-top: 20px; text-align: center; color: var(--c-text-muted);">
        <a data-link href="/login" class="auth-link" style="color: var(--c-text-muted); font-weight: 500;">Back to Sign In</a>
      </p>
    </form>
</div>
