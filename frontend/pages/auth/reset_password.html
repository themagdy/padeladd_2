<div class="auth-container" style="max-width: 400px; margin: 40px auto; padding: 20px; text-align: center;">
    <h2>Reset Password</h2>
    <p style="opacity: 0.8; margin-bottom: 20px;">Enter your new password below</p>
    
    <form id="reset-form" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="hidden" name="token">
        
        <input type="password" name="password" placeholder="New Password" required minlength="6" style="padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background: #232a38; color: white;">
        <input type="password" name="password_confirm" placeholder="Confirm New Password" required minlength="6" style="padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background: #232a38; color: white;">
        
        <button type="submit" class="btn btn-primary">Set New Password</button>
    </form>
</div>
