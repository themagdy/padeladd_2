<div class="auth-page page active container" style="padding: 24px;">
    <div class="auth-logo" style="display:flex; justify-content:left; margin: 24px 0 24px 0;">
      <img src="assets/logo_ico.png" alt="Padeladd" style="width:38px; height:auto; object-fit:contain;">
    </div>
    <h1 class="auth-title">Get started on Padeladd</h1>
    <p class="auth-subtitle" style="color:var(--c-text-muted); text-align:left; margin-bottom:30px;">Create an account to build and connect with a padel community.</p>

    <!-- Step progress dots -->
    <div class="step-progress" style="display:flex; justify-content:center; gap:8px; margin-bottom:30px;">
      <div class="step-dot" style="width:12px; height:6px; border-radius:3px; background:var(--c-primary);"></div>
      <div class="step-dot" style="width:6px; height:6px; border-radius:3px; background:var(--c-bg-secondary);"></div>
    </div>

    <!-- Step 1: Basic info -->
    <form id="register-form" novalidate>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label" for="reg-first">First Name</label>
          <input class="form-input" type="text" id="reg-first" name="first_name" placeholder="Ahmed" autocomplete="given-name" maxlength="15" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-last">Last Name</label>
          <input class="form-input" type="text" id="reg-last" name="last_name" placeholder="Samir" autocomplete="family-name" maxlength="15" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">Email</label>
        <input class="form-input" type="email" id="reg-email" name="email" placeholder="your@email.com" autocomplete="email" maxlength="255" required>
      </div>

      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <div class="input-group">
          <div class="input-prefix" id="reg-country-code">🇪🇬</div>
          <input class="form-input" type="tel" id="reg-phone" name="mobile" placeholder="01xxxxxxxxx" autocomplete="tel" maxlength="15" required>
        </div>
      </div>

      <!-- Viral Invitation Code Slot -->
      <div class="form-group" id="reg-invite-group" style="display: none;">
        <label class="form-label" for="reg-invite">Invitation / Promo Code</label>
        <input class="form-input" type="text" id="reg-invite" name="invite_code" placeholder="PADEL-XXXX or campaign code" maxlength="30" style="font-family: monospace; text-transform: uppercase;">
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-pass">Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="reg-pass" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="btn-reg-next" style="margin-top: 15px;">Continue →</button>

      <p class="text-center text-xs text-muted" style="margin-top: 12px; text-align: center; color: var(--c-text-dim); font-size: 11px;">
        By continuing, you agree to our<br>
        <a data-link href="/terms" style="color: var(--c-primary); text-decoration: underline;">Terms of use</a> and 
        <a href="privacy.html" target="_blank" style="color: var(--c-primary); text-decoration: underline;">Privacy Policy</a>.
      </p>

      <p class="text-center text-sm text-muted mt-md" style="margin-top: 20px; text-align: center; color: var(--c-text-muted);">
        Already have an account?
        <a data-link href="/login" class="auth-link" style="color: var(--c-primary); font-weight: 600;">Sign in</a>
      </p>
    </form>
</div>
