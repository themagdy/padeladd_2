<div class="auth-page page active" style="padding: 20px; max-width: 480px; margin: 0 auto;">
    <div class="auth-logo" style="display:flex; justify-content:left; margin: 24px 0 24px 0;">
      <img src="assets/logo_ico.png" alt="Padeladd" style="width:38px; height:auto; object-fit:contain;">
    </div>
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle" style="color:var(--c-text-muted); text-align:left; margin-bottom:30px;">Enter your email to receive a reset link.</p>
    
    <form id="forgot-form" novalidate>
        <div class="form-group">
            <label class="form-label" for="forgot-email">Email</label>
            <input class="form-input" type="email" id="forgot-email" name="email" placeholder="your@email.com" autocomplete="email" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Send Reset Link</button>
    </form>
    
    <p class="text-center text-sm text-muted mt-md" style="margin-top: 20px; text-align: center; color: var(--c-text-muted);">
        Remember your password?
        <a data-link href="/login" class="auth-link" style="color: var(--c-primary); font-weight: 600;">Sign in</a>
    </p>
</div>
