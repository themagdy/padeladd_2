<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#11161E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
        // Dynamic base href detection
        (function() {
            var isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            var base = document.createElement('base');
            // If on mobile (Capacitor), base is ./
            // If on local MAMP, base is /padeladd4/
            // If on live server, base is /pl/
            if (typeof window.Capacitor !== 'undefined' || window.location.protocol === 'capacitor:') {
                base.href = './';
            } else {
                base.href = isLocal ? '/padeladd4/' : '/pl/';
            }
            document.head.appendChild(base);
        })();
    </script>
    <title>Padeladd</title>
    <link rel="icon" type="image/png" href="assets/logo_ico.png">
    <!-- Priority: UI Rules - Clean, modern, minimal UI, Mobile-first -->
    <!-- Fonts loaded locally via frontend/css/fonts.css -->
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="frontend/css/style.css?v=244">
</head>
<body>
    <div id="app">
        <!-- Unified Top Bar for Sub-pages -->
        <header id="top-bar-nav" class="fixed-top-bar" style="display: none;">
            <div id="top-bar-inner" style="width:100%; max-width:480px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 16px; height: 100%;">
                <a href="javascript:void(0)" onclick="Router.back()" style="display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; background:transparent; border:none; color:var(--c-text); text-decoration:none; margin-left:-12px;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </a>
                <div id="top-bar-actions" style="display: flex; align-items: center;"></div>
            </div>
        </header>

        <main id="app-content">
            <!-- SPA router injects content here -->
        </main>

        <!-- Global Navigation -->
        <nav id="main-nav" style="display: none;">
            <div class="nav-container">
                <a href="dashboard" data-link class="nav-item nav-logo">
                    <img src="assets/logo.png" alt="Padeladd" class="logo-full">
                    <img src="assets/logo_ico.png" alt="Padeladd" class="logo-icon nav-icon nav-logo-icon">
                </a>
                <div class="nav-links">
                    <a href="ranking" data-link class="nav-item">
                        <img src="assets/nav_icons/rank.svg" alt="Rank" class="nav-icon">
                        <span class="nav-label">Rank</span>
                    </a>
                    <a href="matches" data-link class="nav-item">
                        <img src="assets/nav_icons/play.svg" alt="Play" class="nav-icon">
                        <span class="nav-label">Play</span>
                    </a>
                    <a href="matches/my" data-link class="nav-item">
                        <img src="assets/nav_icons/matches.svg" alt="Matches" class="nav-icon">
                        <span class="nav-label">Mine</span>
                    </a>
                </div>
                <div class="nav-right">
                    <a href="profile/view" data-link id="nav-avatar" class="nav-item avatar-circle"></a>
                    <div class="nav-notif" onclick="NotificationsController.toggle()" style="cursor:pointer;">
                        <img src="assets/nav_icons/notif.svg" alt="Notifications" class="nav-icon">
                        <span id="nav-notif-badge" class="notif-badge" style="display: none;">0</span>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <div id="global-loader" class="loading-overlay" style="display: none;">
        <div class="loader-content">
            <img src="assets/logo_ico.png" alt="Padeladd" class="loader-logo">
            <div class="loader-spinner-ring"></div>
        </div>
    </div>

    <!-- Mobile-optimized Cropping Modal -->
    <div id="crop-modal-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; align-items:center; justify-content:center; padding:15px;">
        <div style="width:100%; max-width:400px; background:#111; position:relative; overflow:hidden; border-radius:12px; display:flex; flex-direction:column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:16px; color:#fff;">Center Your Face</h3>
                <button onclick="ProfileController.cancelCrop()" style="background:transparent; border:none; color:#fff; padding:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-right:-10px;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="crop-container" style="height:350px; background:#000; position:relative; width:100%;">
                <img id="crop-image-el" style="max-width:100%; display:block;">
            </div>
            
            <!-- Zoom Controls -->
            <div style="padding:15px; background:#1a1a1a; display:flex; align-items:center; gap:15px; border-top:1px solid #333;">
                <button onclick="ProfileController.zoom(-0.1)" style="background:transparent; border:none; color:#fff; font-size:20px; padding:5px; cursor:pointer;">➖</button>
                <input type="range" id="crop-zoom-bar" min="0.1" max="3" step="0.01" value="1" style="flex:1; accent-color:var(--c-primary); height:4px; border-radius:2px; appearance:none; background:#444;">
                <button onclick="ProfileController.zoom(0.1)" style="background:transparent; border:none; color:#fff; font-size:20px; padding:5px; cursor:pointer;">➕</button>
            </div>

            <div style="padding:15px; background:#111; display:flex; gap:10px; border-top:1px solid #333;">
                <button onclick="ProfileController.confirmCrop()" class="btn btn-primary" style="flex:1;">Perfect, Save Photo</button>
            </div>
        </div>
    </div>

    <!-- Capacitor Core (Only load on native) -->
    <script>
        if (window.location.protocol === 'capacitor:') {
            var script = document.createElement('script');
            script.src = 'capacitor.js';
            document.head.appendChild(script);
        }
    </script>
    <!-- DOMPurify: XSS sanitization for innerHTML -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha512-jB0TkTBeQC9ZSkBqDhdmfTv1qdfbWpGE72yJ/01Srq6hEzZIz2xkz1e57p9ai7IeHMwEG7HpzG6NdptChif5Pg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        window.safeHTML = function(html) {
            if (!html) return '';
            return DOMPurify.sanitize(html, {
                ADD_ATTR: ['style', 'onerror', 'onload', 'onclick', 'onmouseover', 'onmouseout', 'onkeydown', 'oninput', 'onmousedown', 'onmouseup', 'target', 'rel']
            });
        };

        // Precision Hardening: Only allow event handlers that match trusted app patterns
        DOMPurify.addHook('afterSanitizeAttributes', function(node) {
            const handlers = ['onclick', 'onerror', 'onload', 'onmouseover', 'onmouseout', 'onkeydown', 'oninput', 'onmousedown', 'onmouseup'];
            handlers.forEach(attr => {
                if (node.hasAttribute(attr)) {
                    const val = node.getAttribute(attr);
                    // Strictly allow only known internal patterns
                    const isTrusted = 
                        val.includes('Router.navigate') || 
                        val.includes('this.src=') || 
                        val.includes('DashboardController') || 
                        val.includes('MatchesController') || 
                        val.includes('NotificationsController') ||
                        val.includes('ScoringController') ||
                        val.includes('ChatController') ||
                        val.includes('RankingUI') ||
                        val.includes('Auth.') ||
                        val.includes('API.post') ||
                        val.includes('this.parentElement.remove') ||
                        val.includes('classList.add') ||
                        val.includes('this.style.display') ||
                        val.includes('this.style.background') ||
                        val.includes('this.style.transform') ||
                        val.includes('UI.') ||
                        val.includes('clearInterval');
                    
                    if (!isTrusted) {
                        node.removeAttribute(attr);
                    }
                }
            });
        });
    </script>
    <script src="frontend/js/config.js?v=244"></script>
    <script src="frontend/js/auth.js?v=244"></script>
    <script src="frontend/js/api.js?v=244"></script>
    <script src="frontend/js/controllers.js?v=244"></script>
    <script src="frontend/js/router.js?v=244"></script>
    <script src="frontend/js/app.js?v=244"></script>
</body>
</html>
