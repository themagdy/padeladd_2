<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <base href="./">
    <title>Padeladd</title>
    <link rel="icon" type="image/png" href="assets/logo_ico.png">
    <!-- Priority: UI Rules - Clean, modern, minimal UI, Mobile-first -->
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="frontend/css/style.css">
</head>
<body>
    <div id="app">
        <main id="app-content">
            <!-- SPA router injects content here -->
        </main>

        <!-- Global Navigation -->
        <nav id="main-nav" style="display: none;">
            <div class="nav-container">
                <div class="nav-logo" onclick="Router.navigate('/dashboard')">
                    <img src="assets/logo_ico.png" alt="Padeladd">
                    <span>Padeladd</span>
                </div>
                <div class="nav-links">
                    <a href="javascript:void(0)" onclick="Router.navigate('/ranking')" class="nav-item">
                        <img src="assets/nav_icons/rank.svg" alt="Rank">
                        <span class="nav-label">RANK</span>
                    </a>
                    <a href="javascript:void(0)" onclick="Router.navigate('/matches')" class="nav-item">
                        <img src="assets/nav_icons/play.svg" alt="Play">
                        <span class="nav-label">PLAY</span>
                    </a>
                    <a href="javascript:void(0)" onclick="Router.navigate('/matches')" class="nav-item">
                        <img src="assets/nav_icons/matches.svg" alt="Matches">
                        <span class="nav-label">MATCHES</span>
                    </a>
                </div>
                <div class="nav-right">
                    <div id="nav-avatar" onclick="Router.navigate('/profile/view')" class="avatar-circle">?</div>
                    <div class="nav-notif">
                        <img src="assets/nav_icons/notif.svg" alt="Notifications">
                        <span id="nav-notif-badge" class="notif-badge">0</span>
                    </div>
                    <button id="nav-logout" onclick="API.post('/logout').then(() => { Auth.clearAll(); Router.navigate('/login'); })" class="btn-logout">Sign out</button>
                </div>
            </div>
        </nav>
    </div>

    <div id="global-loader" class="loading-overlay" style="display: none;">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading...</div>
    </div>

    <!-- Core App Logic -->
    <script src="frontend/js/config.js?v=2"></script>
    <script src="frontend/js/auth.js?v=2"></script>
    <script src="frontend/js/api.js?v=2"></script>
    <script src="frontend/js/controllers.js?v=2"></script>
    <script src="frontend/js/router.js?v=2"></script>
    <script src="frontend/js/app.js"></script>
</body>
</html>
