<div class="flags-page">
    <div style="display:grid; grid-template-columns: 350px 1fr; gap:24px;">
        <!-- Add Flag Form -->
        <div class="card">
            <h3 style="margin-bottom:20px; color:#fff;">Log New Flag</h3>
            <form onsubmit="AdminControllers.flags.addFlag(event)">
                <div class="form-group" style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:8px; font-size:12px; font-weight:700; color:var(--c-text-muted); text-transform:uppercase;">Player Code</label>
                    <input type="text" id="flag-player-code" placeholder="e.g. B27" required style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:14px; font-weight:700;">
                    <small style="display:block; margin-top:6px; font-size:11px; opacity:0.6;">The unique code of the player</small>
                </div>

                <div class="form-group" style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:8px; font-size:12px; font-weight:700; color:var(--c-text-muted); text-transform:uppercase;">Flag Type</label>
                    <div style="display:flex; gap:12px;">
                        <label style="flex:1; cursor:pointer;">
                            <input type="radio" name="flag_type" value="green" checked style="display:none;" onchange="this.parentElement.parentElement.querySelectorAll('div').forEach(d=>d.style.borderColor='rgba(255,255,255,0.1)'); this.nextElementSibling.style.borderColor='var(--c-green)'">
                            <div style="padding:12px; border:2px solid var(--c-green); border-radius:8px; text-align:center; background:rgba(0,206,0,0.05); transition:all 0.2s;">
                                <span style="font-size:18px;">🟢</span>
                                <div style="font-size:12px; font-weight:700; margin-top:4px; color:#fff;">GREEN</div>
                            </div>
                        </label>
                        <label style="flex:1; cursor:pointer;">
                            <input type="radio" name="flag_type" value="red" style="display:none;" onchange="this.parentElement.parentElement.querySelectorAll('div').forEach(d=>d.style.borderColor='rgba(255,255,255,0.1)'); this.nextElementSibling.style.borderColor='var(--c-red)'">
                            <div style="padding:12px; border:2px solid rgba(255,255,255,0.1); border-radius:8px; text-align:center; background:rgba(241,90,41,0.05); transition:all 0.2s;">
                                <span style="font-size:18px;">🔴</span>
                                <div style="font-size:12px; font-weight:700; margin-top:4px; color:#fff;">RED</div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom:24px;">
                    <label style="display:block; margin-bottom:8px; font-size:12px; font-weight:700; color:var(--c-text-muted); text-transform:uppercase;">Reason / Notes</label>
                    <textarea id="flag-reason" placeholder="Explain why this flag is being given..." required style="width:100%; height:120px; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:13px; font-family:inherit; resize:none;"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; font-weight:700; letter-spacing:1px;">SUBMIT LOG</button>
            </form>
        </div>

        <!-- History Table -->
        <div class="card" style="padding:0; overflow:hidden;">
            <div style="padding:20px 24px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:#fff;">Flag History</h3>
                <div id="page-search-source">
                    <div class="search-wrapper">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4; margin-right:8px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="flags-search" placeholder="Search by player or code..." oninput="AdminControllers.flags.setSearch(this.value)" style="background:none; border:none; color:#fff; font-size:13px; font-weight:600; width:180px; outline:none;">
                    </div>
                </div>
            </div>
            
            <div style="min-height:400px;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Flag</th>
                            <th>Reason</th>
                            <th style="text-align:right;">Date</th>
                            <th style="width:50px;"></th>
                        </tr>
                    </thead>
                    <tbody id="flags-list">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
                <div id="flags-empty" style="display:none; text-align:center; padding:60px; color:var(--c-text-muted);">
                    No flag logs found.
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .search-wrapper {
        display: flex;
        align-items: center;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        padding: 6px 14px;
        border-radius: 8px;
        transition: all 0.2s;
    }
    .search-wrapper:focus-within {
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.15);
    }
</style>
