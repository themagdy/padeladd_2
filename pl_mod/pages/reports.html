<div class="reports-page">
    <div class="card" style="padding:0; overflow:hidden;">
        <div class="tabs" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.05); padding-right:24px;">
            <div style="display:flex;">
                <button onclick="AdminControllers.reports.switchTab('profile')" id="tab-profile-reports" class="report-tab active">
                    Player Reports <span id="count-profile-reports" class="tab-count">0</span>
                </button>
                <button onclick="AdminControllers.reports.switchTab('match')" id="tab-match-reports" class="report-tab">
                    Match Reports <span id="count-match-reports" class="tab-count">0</span>
                </button>
            </div>

            <div style="display:flex; align-items:center; gap:24px;">
                <div class="search-wrapper">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4; margin-right:8px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="reports-search" placeholder="Search reports..." oninput="AdminControllers.reports.setSearch(this.value)" style="background:none; border:none; color:#fff; font-size:13px; font-weight:600; width:180px; outline:none;">
                </div>

                <label class="switch-container">
                    <span style="font-size:11px; font-weight:800; color:var(--c-text-muted); text-transform:uppercase; letter-spacing:1px;">Show Archived</span>
                    <input type="checkbox" id="show-archived-reports" onchange="AdminControllers.reports.toggleArchived(this.checked)">
                    <span class="switch-slider"></span>
                </label>
            </div>
        </div>
        
        <div id="reports-container" style="min-height:400px;">
            <table class="admin-table">
                <thead id="reports-head"></thead>
                <tbody id="reports-list"></tbody>
            </table>
            <div id="reports-empty" style="display:none; text-align:center; padding:60px; color:var(--c-text-muted);">
                No reports found in this category.
            </div>
        </div>
    </div>
</div>

<style>
    .report-tab {
        padding: 20px 32px;
        background: none;
        color: var(--c-text-muted);
        font-weight: 700;
        font-size: 14px;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
    }
    .report-tab.active {
        color: var(--c-primary);
        border-bottom-color: var(--c-primary);
        background: rgba(27, 82, 206, 0.05);
    }
    .report-tab:hover:not(.active) {
        background: rgba(255,255,255,0.02);
        color: #fff;
    }
    .tab-count {
        background: rgba(255,255,255,0.05);
        padding: 2px 8px;
        border-radius: 100px;
        font-size: 11px;
        margin-left: 8px;
        opacity: 0.7;
        font-weight: 800;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .report-tab.active .tab-count {
        background: var(--c-primary);
        color: #fff;
        opacity: 1;
        border-color: rgba(255,255,255,0.1);
    }
    .search-wrapper {
        display: flex;
        align-items: center;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        padding: 6px 14px;
        border-radius: 8px;
        transition: all 0.2s;
    }
    .search-wrapper:focus-within {
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.15);
    }
</style>
