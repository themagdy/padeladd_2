<!-- Stats Boxes -->
<div class="dashboard-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:24px;">

    <div class="card" style="border-left: 4px solid var(--c-primary); padding: 16px 20px; margin-bottom:0;">
        <div style="font-size:10px; font-weight:800; color:var(--c-text-muted); text-transform:uppercase; margin-bottom:4px; letter-spacing:0.5px;">App Users</div>
        <div id="ver-stat-total" style="font-size:28px; font-weight:800; color:#fff; line-height:1.2;">--</div>
        <div style="font-size:10px; color:var(--c-text-muted); margin-top:4px;">On native app</div>
    </div>

    <div class="card" style="border-left: 4px solid var(--c-green); padding: 16px 20px; margin-bottom:0;">
        <div style="font-size:10px; font-weight:800; color:var(--c-text-muted); text-transform:uppercase; margin-bottom:4px; letter-spacing:0.5px;">On Latest</div>
        <div id="ver-stat-latest" style="font-size:28px; font-weight:800; color:#fff; line-height:1.2;">--</div>
        <div style="font-size:10px; color:var(--c-green); margin-top:4px;">Up to date</div>
    </div>

    <div class="card" style="border-left: 4px solid var(--c-orange); padding: 16px 20px; margin-bottom:0;">
        <div style="font-size:10px; font-weight:800; color:var(--c-text-muted); text-transform:uppercase; margin-bottom:4px; letter-spacing:0.5px;">Outdated</div>
        <div id="ver-stat-outdated" style="font-size:28px; font-weight:800; color:#fff; line-height:1.2;">--</div>
        <div style="font-size:10px; color:var(--c-orange); margin-top:4px;">Older build</div>
    </div>

    <div class="card" style="border-left: 4px solid var(--c-text-dim); padding: 16px 20px; margin-bottom:0;">
        <div style="font-size:10px; font-weight:800; color:var(--c-text-muted); text-transform:uppercase; margin-bottom:4px; letter-spacing:0.5px;">Web Users</div>
        <div id="ver-stat-never" style="font-size:28px; font-weight:800; color:#fff; line-height:1.2;">--</div>
        <div style="font-size:10px; color:var(--c-text-muted); margin-top:4px;">Used browser</div>
    </div>

</div>

<!-- Search + Version Filter -->
<div class="page-header-actions" style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
    <div id="page-search-source" style="flex:1; min-width:200px;">
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" placeholder="Search players or versions..." onkeyup="AdminControllers.versions.setSearch(this.value)">
        </div>
    </div>
    <div>
        <select id="ver-filter-version" onchange="AdminControllers.versions.setVersionFilter(this.value)"
            style="background:var(--c-bg-card); color:#fff; border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:9px 14px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; outline:none; min-width:160px;">
            <option value="">All Versions</option>
        </select>
    </div>
</div>

<div class="card">
    <div class="table-container">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Player</th>
                    <th style="cursor:pointer;" onclick="AdminControllers.versions.setSort('last_build_ref')">App Build Version ↕️</th>
                    <th style="cursor:pointer;" onclick="AdminControllers.versions.setSort('last_activity')">Last Activity ↕️</th>
                </tr>
            </thead>
            <tbody id="versions-list">
                <!-- Loaded via JS -->
            </tbody>
        </table>
        <div id="versions-empty" class="empty-state" style="display:none;">
            <div class="empty-icon">📱</div>
            <h3>No data found</h3>
            <p>Once users start using the native app, their versions will appear here.</p>
        </div>
    </div>
</div>
