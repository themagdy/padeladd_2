<div class="page-header-actions">
    <div id="page-search-source">
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" placeholder="Search announcements..." onkeyup="AdminControllers.announcements.setSearch(this.value)">
        </div>
        <button class="btn-primary" onclick="AdminControllers.announcements.openModal()">
            <span>➕</span> New Announcement
        </button>
    </div>
</div>

<div class="card">
    <div class="table-container">
        <table class="admin-table">
            <thead>
                <tr>
                    <th style="width:120px;">Cover</th>
                    <th>Title</th>
                    <th>Date Posted</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
            </thead>
            <tbody id="announcements-list">
                <!-- Loaded via JS -->
            </tbody>
        </table>
        <div id="announcements-empty" class="empty-state" style="display:none;">
            <div class="empty-icon">📢</div>
            <h3>No announcements found</h3>
            <p>Create your first announcement to notify players.</p>
        </div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div id="announcement-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card" style="max-width:750px;">
        <div class="modal-header">
            <h3 id="modal-title">Create Announcement</h3>
            <button class="btn-close-modal" onclick="AdminControllers.announcements.closeModal()">✕</button>
        </div>
        <form id="announcement-form" onsubmit="AdminControllers.announcements.saveAnnouncement(event)">
            <input type="hidden" name="id" id="edit-announcement-id">
            <div class="modal-body">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" id="announcement-title-input" class="admin-input" required placeholder="Announcement Title" style="height: 48px; box-sizing: border-box;">
                </div>

                <!-- Cover Image Section -->
                <div class="form-group">
                    <label>Cover / Featured Image</label>
                    <div style="display:flex; gap:16px; align-items:center;">
                        <div id="announcement-image-preview" style="width:180px; height:100px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px dashed rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; overflow:hidden;">
                            <span style="font-size:24px; color:var(--c-text-muted);">🖼️</span>
                        </div>
                        <div style="flex:1;">
                            <input type="file" id="announcement-image-file" accept="image/*" style="display:none;" onchange="AdminControllers.announcements.previewImage(event)">
                            <button type="button" class="btn-secondary" onclick="document.getElementById('announcement-image-file').click()">Select Cover Image</button>
                            <p style="font-size:11px; color:var(--c-text-muted); margin-top:8px;">Recommended ratio is 21:9 or 16:9. We resize up to 1200px width.</p>
                        </div>
                    </div>
                </div>

                <!-- Rich Text Editor -->
                <div class="form-group">
                    <label style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Body Content</span>
                        <div class="editor-toolbar" style="display:flex; gap:4px;">
                            <button type="button" title="Toggle HTML/RTE" onclick="AdminControllers.announcements.toggleEditorMode()" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--c-text-muted); padding:0 8px; height:28px; border-radius:4px; font-size:10px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; letter-spacing:1px;">&lt;/&gt;</button>
                            <button type="button" title="Bold" onclick="document.execCommand('bold', false, null)" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; width:28px; height:28px; border-radius:4px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;">B</button>
                            <button type="button" title="Primary Blue" onclick="document.execCommand('foreColor', false, '#1b52ce')" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--c-primary); width:28px; height:28px; border-radius:4px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;">A</button>
                            <button type="button" title="Orange" onclick="document.execCommand('foreColor', false, '#f15a29')" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--c-orange); width:28px; height:28px; border-radius:4px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;">A</button>
                            <button type="button" title="Clear Formatting" onclick="document.execCommand('removeFormat', false, null)" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--c-text-muted); width:28px; height:28px; border-radius:4px; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;">✖</button>
                        </div>
                    </label>
                    <div id="announcement-body-editor" contenteditable="true" class="admin-input" style="height:350px; overflow-y:auto; padding:12px; line-height:1.6; font-size:14px; outline:none; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); border-radius:12px;"></div>
                    <textarea id="announcement-body-html" class="admin-input" style="height:350px; display:none; padding:12px; line-height:1.6; font-size:14px; font-family:monospace; outline:none; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); border-radius:12px; color:rgba(255,255,255,0.8); resize:none; width:100%; box-sizing:border-box;"></textarea>
                </div>

            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="AdminControllers.announcements.closeModal()">Cancel</button>
                <button type="submit" class="btn-primary">Save Announcement</button>
            </div>
        </form>
    </div>
</div>
