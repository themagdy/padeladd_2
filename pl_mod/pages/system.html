<div class="system-page">

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
        <!-- Maintenance Tasks -->
        <div class="card">
            <h3 style="color:#fff; margin-top:0; margin-bottom:20px;">Maintenance Tasks</h3>
            <div style="display:flex; flex-direction:column; gap:16px;">
                <div
                    style="display:flex; justify-content:space-between; align-items:center; padding:16px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--c-border);">
                    <div>
                        <div style="font-weight:700; color:#fff;">Score Auto-Verify</div>
                        <p style="font-size:12px; color:var(--c-text-muted); margin:0;">Checks for scores older than 24h
                            and approves them.</p>
                    </div>
                    <button onclick="AdminControllers.system.runTask('auto_confirm')" class="btn-badge"
                        style="background:var(--c-primary); color:#fff; border:none; padding:8px 16px; border-radius:8px; font-weight:700;">RUN
                        NOW</button>
                </div>

                <div
                    style="display:flex; justify-content:space-between; align-items:center; padding:16px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--c-border);">
                    <div>
                        <div style="font-weight:700; color:#fff;">Match Reminders</div>
                        <p style="font-size:12px; color:var(--c-text-muted); margin:0;">Sends push notifications to
                            players 2h before matches.</p>
                    </div>
                    <button onclick="AdminControllers.system.runTask('match_reminders')" class="btn-badge"
                        style="background:var(--c-primary); color:#fff; border:none; padding:8px 16px; border-radius:8px; font-weight:700;">RUN
                        NOW</button>
                </div>


                <div
                    style="display:flex; justify-content:space-between; align-items:center; padding:16px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--c-border);">
                    <div>
                        <div style="font-weight:700; color:#fff;">Fix Missing Stats</div>
                        <p style="font-size:12px; color:var(--c-text-muted); margin:0;">Ensures all users have a record
                            in the stats table.</p>
                    </div>
                    <button onclick="AdminControllers.system.runTask('fix_stats')" class="btn-badge"
                        style="background:rgba(255,255,255,0.05); color:var(--c-text-muted); border:1px solid var(--c-border); padding:8px 16px; border-radius:8px; font-weight:700;">RUN
                        NOW</button>
                </div>
            </div>
        </div>

        <!-- Execution Console -->
        <div class="card" style="display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="color:#fff; margin:0;">Execution Console</h3>
                <button onclick="document.getElementById('console-output').innerHTML = '<div class=\'log-entry\' style=\'opacity:0.5\'>&gt; Console cleared. Waiting for task...</div>'" class="btn-badge" style="background:rgba(255,255,255,0.05); color:var(--c-text-muted); border:1px solid rgba(255,255,255,0.1); padding:4px 12px; font-size:11px;">CLEAR</button>
            </div>
            <div id="console-output"
                style="background:#0a0e14; padding:20px; border-radius:12px; height:320px; overflow-y:auto; font-family:'JetBrains Mono', 'Roboto Mono', monospace; font-size:13px; color:#d1d5db; line-height:1.6; border:1px solid var(--c-border); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);">
                <div class="log-entry" style="color:var(--c-green); opacity:0.8;">&gt; System ready. Waiting for task...</div>
            </div>
        </div>
    </div>
</div>

<style>
    .log-entry {
        padding: 4px 0;
        border-bottom: 1px solid rgba(255,255,255,0.03);
        word-break: break-all;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry.task-header { color: var(--c-primary); font-weight: 700; margin-top: 10px; border-bottom: none; }
    .log-entry.task-success { color: var(--c-green); font-weight: 700; border-bottom: 1px solid rgba(0,255,0,0.1); margin-bottom: 5px; }
    .log-entry.task-error { color: var(--c-red); font-weight: 700; background: rgba(255,0,0,0.05); padding: 8px; border-radius: 4px; }
</style>
    </div>

</div>
