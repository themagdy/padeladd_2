<div class="system-page">

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
        <!-- Maintenance Tasks -->
        <div class="card">
            <h3 style="color:#fff; margin-top:0; margin-bottom:20px;">Maintenance Tasks</h3>
            <div style="display:flex; flex-direction:column; gap:16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--c-border);">
                    <div>
                        <div style="font-weight:700; color:#fff;">Score Auto-Verify</div>
                        <p style="font-size:12px; color:var(--c-text-muted); margin:0;">Checks for scores older than 24h and approves them.</p>
                    </div>
                    <button onclick="AdminControllers.system.runTask('auto_confirm')" class="btn-badge" style="background:var(--c-primary); color:#fff; border:none; padding:8px 16px; border-radius:8px; font-weight:700;">RUN NOW</button>
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--c-border);">
                    <div>
                        <div style="font-weight:700; color:#fff;">Fix Missing Stats</div>
                        <p style="font-size:12px; color:var(--c-text-muted); margin:0;">Ensures all users have a record in the stats table.</p>
                    </div>
                    <button onclick="AdminControllers.system.runTask('fix_stats')" class="btn-badge" style="background:rgba(255,255,255,0.05); color:var(--c-text-muted); border:1px solid var(--c-border); padding:8px 16px; border-radius:8px; font-weight:700;">RUN NOW</button>
                </div>
            </div>
        </div>

        <!-- Execution Console -->
        <div class="card">
            <h3 style="color:#fff; margin-top:0; margin-bottom:20px;">Execution Console</h3>
            <div id="console-output" style="background:#000; padding:16px; border-radius:12px; height:200px; overflow-y:auto; font-family:monospace; font-size:12px; color:var(--c-green); line-height:1.4; border:1px solid var(--c-border);">
                > System ready. Waiting for task...
            </div>
        </div>
    </div>

</div>
