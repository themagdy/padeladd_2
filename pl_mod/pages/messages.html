<div class="page-header-actions">
    <div id="page-search-source">
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" placeholder="Search messages..." onkeyup="AdminControllers.messages.setSearch(this.value)">
        </div>
        <button class="btn-primary" onclick="AdminControllers.messages.openModal()">
            <span>➕</span> New Message
        </button>
    </div>
</div>

<div class="card">
    <div class="table-container">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Heading</th>
                    <th>Target</th>
                    <th>Action</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
            </thead>
            <tbody id="messages-list">
                <!-- Loaded via JS -->
            </tbody>
        </table>
        <div id="messages-empty" class="empty-state" style="display:none;">
            <div class="empty-icon">📢</div>
            <h3>No messages found</h3>
            <p>Create your first in-app announcement to engage players.</p>
        </div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div id="message-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card" style="max-width:600px;">
        <div class="modal-header">
            <h3 id="modal-title">Create In-App Message</h3>
            <button class="btn-close-modal" onclick="AdminControllers.messages.closeModal()">✕</button>
        </div>
        <form id="message-form" onsubmit="AdminControllers.messages.saveMessage(event)">
            <input type="hidden" name="id" id="edit-message-id">
            <div class="modal-body">
                <div class="form-group">
                    <label>Target Audience</label>
                    <select name="target_type" class="admin-input" onchange="AdminControllers.messages.toggleTargetInput(this.value)">
                        <option value="all">All Users</option>
                        <option value="specific">Specific User (by Player Code)</option>
                    </select>
                </div>

                <div id="target-build-group" class="form-group">
                    <label>Target Build Versions (Select none for all)</label>
                    <div id="target-build-list" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; max-height:120px; overflow-y:auto; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px;">
                        <div style="grid-column: 1 / -1; color: var(--c-text-muted); font-size: 12px; text-align: center; padding: 10px;">Loading builds...</div>
                    </div>
                </div>
                
                <div id="target-player-code-group" class="form-group" style="display:none;">
                    <label>Target Player Code</label>
                    <input type="text" name="target_player_code" class="admin-input" placeholder="e.g. PL-1234">
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex:1;">
                        <label>Heading</label>
                        <input type="text" name="heading" class="admin-input" required placeholder="Main title">
                    </div>
                    <div class="form-group" style="width:100px;">
                        <label>Top Emoji</label>
                        <input type="text" name="emoji" class="admin-input" value="👋" style="text-align:center; font-size:20px;">
                    </div>
                </div>

                <div class="form-group">
                    <label style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Body Content</span>
                        <div class="editor-toolbar" style="display:flex; gap:4px;">
                            <button type="button" title="Bold" onclick="document.execCommand('bold', false, null)" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; width:28px; height:28px; border-radius:4px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;">B</button>
                            <button type="button" title="Primary Blue" onclick="document.execCommand('foreColor', false, '#1b52ce')" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--c-primary); width:28px; height:28px; border-radius:4px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;">A</button>
                            <button type="button" title="Orange" onclick="document.execCommand('foreColor', false, '#f15a29')" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--c-orange); width:28px; height:28px; border-radius:4px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center;">A</button>
                            <button type="button" title="Clear Formatting" onclick="document.execCommand('removeFormat', false, null)" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--c-text-muted); width:28px; height:28px; border-radius:4px; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;">✖</button>
                        </div>
                    </label>
                    <div id="message-body-editor" contenteditable="true" class="admin-input" style="height:150px; overflow-y:auto; padding:12px; line-height:1.6; font-size:14px; outline:none; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); border-radius:12px;"></div>
                    <input type="hidden" name="body" id="message-body-hidden">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Button Text</label>
                        <input type="text" name="button_text" class="admin-input" value="Got it" required>
                    </div>
                    <div class="form-group">
                        <label>Action Type</label>
                        <select name="action_type" class="admin-input" onchange="AdminControllers.messages.toggleActionFields(this.value)">
                            <option value="close">Close Popup</option>
                            <option value="navigate">Navigate to App Page</option>
                            <option value="external">External Link</option>
                        </select>
                    </div>
                </div>

                <div id="action-navigate-group" class="form-group" style="display:none;">
                    <label>Select App Page</label>
                    <select name="page_route" class="admin-input">
                        <option value="/dashboard">Dashboard</option>
                        <option value="/profile/view">Player Profile (Personal)</option>
                        <option value="/matches/my">My Matches</option>
                        <option value="/matches">Play</option>
                        <option value="/ranking">Ranking</option>
                        <option value="/rules">Padeladd Rules</option>
                        <option value="/terms">Terms</option>
                    </select>
                </div>

                <div id="action-external-group" style="display:none;">
                    <div class="form-group">
                        <label>Android URL</label>
                        <input type="url" name="android_url" class="admin-input" placeholder="https://play.google.com/...">
                    </div>
                    <div class="form-group">
                        <label>iOS URL</label>
                        <input type="url" name="ios_url" class="admin-input" placeholder="https://apps.apple.com/...">
                    </div>
                </div>

                <div class="form-group" style="display:flex; flex-direction:column; gap:12px; background:rgba(255,255,255,0.03); padding:15px; border-radius:12px;">
                    <label class="checkbox-container" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" name="is_active" checked>
                        <span>Active (Visible to users)</span>
                    </label>
                    <label class="checkbox-container" style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--c-red); font-weight:700;">
                        <input type="checkbox" name="is_undismissable" id="is-undismissable">
                        <span>🛑 Undismissable (Must take action)</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="AdminControllers.messages.closeModal()">Cancel</button>
                <button type="submit" class="btn-primary">Save Message</button>
            </div>
        </form>
    </div>
</div>

<!-- Stats Modal -->
<div id="stats-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card" style="max-width:700px;">
        <div class="modal-header">
            <h3>Message Read Status</h3>
            <button class="btn-close-modal" onclick="AdminControllers.messages.closeStatsModal()">✕</button>
        </div>
        <div class="modal-body" style="padding:0;">
            <div id="stats-summary" style="padding:20px 32px; border-bottom:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); display:flex; justify-content:space-between; align-items:center;">
                <!-- Loaded via JS -->
            </div>
            <div style="max-height:400px; overflow-y:auto; padding:0 32px;">
                <table class="admin-table" style="font-size:13px;">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Code</th>
                            <th>Viewed At</th>
                        </tr>
                    </thead>
                    <tbody id="stats-list">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" onclick="AdminControllers.messages.closeStatsModal()">Close</button>
        </div>
    </div>
</div>

<!-- Preview Modal (Mimics user view) -->
<div id="preview-modal" class="modal-overlay" style="display:none;">
    <div id="preview-modal-card" style="background:rgba(23, 23, 28, 0.85); backdrop-filter:blur(25px); border:1px solid rgba(255,255,255,0.1); border-radius:32px; padding:28px; width:100%; max-width:340px; text-align:center; position:relative; box-shadow:0 30px 60px rgba(0,0,0,0.6);">
        
        <!-- Premium Emoji Frame -->
        <div style="margin: 0 auto 20px; width:72px; height:72px; position:relative; display:flex; align-items:center; justify-content:center;">
            <div style="position:absolute; inset:0; border-radius:50%; background:linear-gradient(135deg, var(--c-primary), #6366f1); opacity:0.15; filter:blur(10px);"></div>
            <div style="position:absolute; inset:0; border-radius:50%; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03);"></div>
            <div id="preview-emoji" style="font-size:34px; z-index:1; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));">👋</div>
        </div>

        <h2 id="preview-heading" style="font-size:20px; font-weight:900; color:#fff; margin-bottom:10px; letter-spacing:-0.5px; line-height:1.2;">Heading</h2>
        <div id="preview-body" style="font-size:13px; color:rgba(255,255,255,0.6); line-height:1.6; margin-bottom:28px; font-weight:400; padding:0 10px;">Body content goes here.</div>
        
        <button id="preview-button" class="btn-primary" style="width:100%; padding:14px; border-radius:16px; font-weight:800; font-size:14px; letter-spacing:0.5px; text-transform:uppercase; box-shadow: 0 8px 20px rgba(27, 82, 206, 0.25);" onclick="AdminControllers.messages.closePreviewModal()">Got it</button>
    </div>
</div>
