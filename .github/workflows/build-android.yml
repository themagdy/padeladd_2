name: Build Android App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        working-directory: mobile_app
        run: npm install

      - name: Build Web App
        working-directory: mobile_app
        run: npm run build

      - name: Sync Capacitor
        working-directory: mobile_app
        run: npx cap sync android

      - name: Inject Google Services (Optional for Push Notifications)
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > mobile_app/android/app/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > mobile_app/android/app/padeladd-new-upload-key.keystore

      - name: Make Gradlew Executable
        working-directory: mobile_app/android
        run: chmod +x ./gradlew

      - name: Build Android App Bundle (AAB for Play Store)
        working-directory: mobile_app/android
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Build Android APK (for Local Testing)
        working-directory: mobile_app/android
        run: ./gradlew assembleDebug

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: mobile_app/android/app/build/outputs/bundle/release/*.aab

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile_app/android/app/build/outputs/apk/debug/*.apk
