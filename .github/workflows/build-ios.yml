name: Build iOS Native App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: mobile_app
        run: npm install

      - name: Build Web App
        working-directory: mobile_app
        run: npm run build

      - name: Sync Capacitor
        working-directory: mobile_app
        run: npx cap sync ios

      - name: Generate Launcher Icons
        working-directory: mobile_app
        run: |
          npx @capacitor/assets generate --ios
          
          # Use macOS native sips tool to resize the source image into all standard sizes
          APPICONSET_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          SOURCE_IMG="$APPICONSET_DIR/AppIcon-512@2x.png"
          
          sips -z 40 40 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-20x20@2x.png"
          sips -z 60 60 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-20x20@3x.png"
          sips -z 29 29 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-29x29@1x.png"
          sips -z 58 58 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-29x29@2x.png"
          sips -z 87 87 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-29x29@3x.png"
          sips -z 80 80 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-40x40@2x.png"
          sips -z 120 120 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-40x40@3x.png"
          sips -z 120 120 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-60x60@2x.png"
          sips -z 180 180 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-60x60@3x.png"
          sips -z 20 20 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-20x20~ipad.png"
          sips -z 40 40 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-20x20@2x~ipad.png"
          sips -z 29 29 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-29x29~ipad.png"
          sips -z 58 58 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-29x29@2x~ipad.png"
          sips -z 40 40 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-40x40~ipad.png"
          sips -z 80 80 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-40x40@2x~ipad.png"
          sips -z 76 76 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-76x76~ipad.png"
          sips -z 152 152 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-76x76@2x~ipad.png"
          sips -z 167 167 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-83.5x83.5@2x~ipad.png"
          sips -z 1024 1024 "$SOURCE_IMG" --out "$APPICONSET_DIR/AppIcon-1024x1024.png"
          
          # Force Contents.json mapping
          cat <<EOF > "$APPICONSET_DIR/Contents.json"
          {
            "images": [
              { "size": "20x20", "idiom": "iphone", "filename": "AppIcon-20x20@2x.png", "scale": "2x" },
              { "size": "20x20", "idiom": "iphone", "filename": "AppIcon-20x20@3x.png", "scale": "3x" },
              { "size": "29x29", "idiom": "iphone", "filename": "AppIcon-29x29@1x.png", "scale": "1x" },
              { "size": "29x29", "idiom": "iphone", "filename": "AppIcon-29x29@2x.png", "scale": "2x" },
              { "size": "29x29", "idiom": "iphone", "filename": "AppIcon-29x29@3x.png", "scale": "3x" },
              { "size": "40x40", "idiom": "iphone", "filename": "AppIcon-40x40@2x.png", "scale": "2x" },
              { "size": "40x40", "idiom": "iphone", "filename": "AppIcon-40x40@3x.png", "scale": "3x" },
              { "size": "60x60", "idiom": "iphone", "filename": "AppIcon-60x60@2x.png", "scale": "2x" },
              { "size": "60x60", "idiom": "iphone", "filename": "AppIcon-60x60@3x.png", "scale": "3x" },
              { "size": "20x20", "idiom": "ipad", "filename": "AppIcon-20x20~ipad.png", "scale": "1x" },
              { "size": "20x20", "idiom": "ipad", "filename": "AppIcon-20x20@2x~ipad.png", "scale": "2x" },
              { "size": "29x29", "idiom": "ipad", "filename": "AppIcon-29x29~ipad.png", "scale": "1x" },
              { "size": "29x29", "idiom": "ipad", "filename": "AppIcon-29x29@2x~ipad.png", "scale": "2x" },
              { "size": "40x40", "idiom": "ipad", "filename": "AppIcon-40x40~ipad.png", "scale": "1x" },
              { "size": "40x40", "idiom": "ipad", "filename": "AppIcon-40x40@2x~ipad.png", "scale": "2x" },
              { "size": "76x76", "idiom": "ipad", "filename": "AppIcon-76x76~ipad.png", "scale": "1x" },
              { "size": "76x76", "idiom": "ipad", "filename": "AppIcon-76x76@2x~ipad.png", "scale": "2x" },
              { "size": "83.5x83.5", "idiom": "ipad", "filename": "AppIcon-83.5x83.5@2x~ipad.png", "scale": "2x" },
              { "size": "1024x1024", "idiom": "ios-marketing", "filename": "AppIcon-1024x1024.png", "scale": "1x" }
            ],
            "info": { "version": 1, "author": "xcode" }
          }
          EOF

      - name: Install CocoaPods Dependencies
        working-directory: mobile_app/ios/App
        run: pod install

      - name: Install Apple Certificates (Optional for Signing)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/cee47eac-c3a5-41d3-a8cd-ce9db6cd100e.mobileprovision

      - name: Configure Xcode Project Signing
        working-directory: mobile_app/ios/App
        run: |
          PROJECT_FILE="App.xcodeproj/project.pbxproj"
          # Disable Automatic Provisioning Style in TargetAttributes
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' $PROJECT_FILE
          
          # Replace Automatic Signing Style with Manual and append required variables under target build configurations
          # Also change the default signing identity to Apple Distribution for Release builds
          python3 -c "
          with open('$PROJECT_FILE', 'r') as f:
              content = f.read()
          replacement = 'CODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = \"QZ23FAU7R2\";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"cee47eac-c3a5-41d3-a8cd-ce9db6cd100e\";\n\t\t\t\tPROVISIONING_PROFILE = \"cee47eac-c3a5-41d3-a8cd-ce9db6cd100e\";'
          content = content.replace('CODE_SIGN_STYLE = Automatic;', replacement)
          content = content.replace('CODE_SIGN_IDENTITY = \"iPhone Developer\";', 'CODE_SIGN_IDENTITY = \"Apple Distribution\";')
          with open('$PROJECT_FILE', 'w') as f:
              f.write(content)
          "

      - name: Export Options Plist Configuration
        working-directory: mobile_app/ios/App
        run: |
          cat <<EOF > exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>QZ23FAU7R2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.padeladd.app</key>
              <string>cee47eac-c3a5-41d3-a8cd-ce9db6cd100e</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build Xcode Archive
        working-directory: mobile_app/ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            -allowProvisioningUpdates \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db"

      - name: Generate Signed IPA
        working-directory: mobile_app/ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/Exported \
            -exportOptionsPlist exportOptions.plist \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db"

      - name: Upload Signed IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-signed-ipa
          path: mobile_app/ios/App/build/Exported/App.ipa

      - name: Upload Full XCArchive Artifact (For Manual Backups)
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: mobile_app/ios/App/build/App.xcarchive

